networks:
  litellm-net:
    driver: bridge
services:
  cloudflared:
    command: tunnel --no-autoupdate run
    depends_on:
    - litellm
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    image: cloudflare/cloudflared:latest
    networks:
    - litellm-net
    restart: unless-stopped
  litellm:
    command:
    - --config
    - /etc/litellm/config.yaml
    - --host
    - 0.0.0.0
    - --port
    - '4000'
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
    - .env
    environment:
      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS}
      DATABASE_URL: ${DATABASE_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      PROXY_ADMIN_ID: ${PROXY_ADMIN_ID:-}
      PROXY_BASE_URL: ${PROXY_BASE_URL}
      STORE_MODEL_IN_DB: ${STORE_MODEL_IN_DB:-True}
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 20s
      test:
      - CMD-SHELL
      - python3 -c "import socket; s=socket.create_connection(('127.0.0.1',4000),3);
        s.close()" || exit 1
      timeout: 5s
    image: ghcr.io/berriai/litellm-database@sha256:ade02ef3dc6db262df99781b7ee696d4a13c8fd443069f2d6f2f941a82f5427b
    networks:
    - litellm-net
    restart: unless-stopped
    volumes:
    - ./config.yaml:/etc/litellm/config.yaml:ro
  postgres:
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 10s
      test:
      - CMD-SHELL
      - pg_isready -U "${POSTGRES_USER}" -d "${POSTGRES_DB}"
      timeout: 5s
    image: postgres:16-alpine
    networks:
    - litellm-net
    restart: unless-stopped
    volumes:
    - litellm-pgdata:/var/lib/postgresql/data
volumes:
  litellm-pgdata: {}
