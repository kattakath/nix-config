<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050506; }
  @keyframes kb { from { transform: scale(1); } to { transform: scale(1.12); } }
  @keyframes pulse { 0%, 100% { opacity: .35; } 50% { opacity: .75; } }
  /* Placeholder mesh gradient slowly drifts (compositor-only transform) so an
     un-loaded panel feels alive rather than static. The layer is 2× the panel
     and centred, so rotation/translate never exposes an empty corner. */
  @keyframes meshDrift {
    0%   { transform: rotate(0deg)  scale(1.10) translate(-6%, -4%); }
    50%  { transform: rotate(9deg)  scale(1.35) translate(5%, 6%); }
    100% { transform: rotate(-7deg) scale(1.15) translate(-3%, 5%); }
  }
  .mesh { will-change: transform; }
  @media (prefers-reduced-motion: reduce) { .mesh { animation: none !important; } }

  /* ── App shell: the Tweaks panel is a DRAWER that pushes the collage, not a
        popup. Desktop → left column; mobile → top strip (media query below). ── */
  .app-shell { position: fixed; inset: 0; display: flex; flex-direction: row; background: #050506; }
  .collage-cell { position: relative; flex: 1 1 auto; min-width: 0; min-height: 0; overflow: hidden; }

  /* ── Tweaks: translucent overlay drawer ON TOP. Desktop → a right-anchored
        column only as wide as its controls (full height). Mobile → full screen
        (width + height). Flat, no shadow, no border. Sign-in pinned to bottom. ── */
  /* backdrop-filter (below) blurs the collage because .collage-cell is an EARLIER
     sibling that paints before .tw-panel within the shared .app-shell (position:fixed)
     stacking context — the collage is in this element's backdrop root. To keep the blur:
     (1) keep .tw-panel a translucent sibling of .collage-cell inside .app-shell, painted
     AFTER it; (2) keep a translucent bg (an opaque fill leaves nothing to blur); (3) do
     NOT add a stacking-context/backdrop-root (transform, filter, opacity<1, will-change,
     isolation, z-index+position) to .collage-cell or .app-shell. Isolating the collage
     RENDER ROOT (a descendant of .collage-cell, in JS rootStyle) is SAFE and unrelated. */
  .tw-panel {
    position: fixed; top: 0; right: 0; bottom: 0; left: auto; z-index: 60; box-sizing: border-box;
    width: 400px; max-width: 100%;
    overflow-y: auto; display: flex; flex-direction: column;
    padding: 18px 20px 22px;
    background: rgba(12, 13, 16, 0.55);
    backdrop-filter: blur(22px) saturate(1.3); -webkit-backdrop-filter: blur(22px) saturate(1.3);
    color: rgba(255, 255, 255, 0.92);
    font: 400 14px/1.45 'Space Grotesk', sans-serif;
    animation: twInFade 0.22s ease;
  }
  @keyframes twInFade { from { opacity: 0; } to { opacity: 1; } }
  @media (max-width: 700px) { .tw-panel { left: 0; width: 100%; } } /* mobile: full screen width */
  .tw-acct-wrap { margin-top: auto; padding-top: 16px; } /* pins sign-in to the bottom */
  /* Invisible top-right hotspot — click to open Tweaks. No icon, no burger. */
  .tw-burger {
    position: fixed; top: 0; right: 0; z-index: 50;
    width: 68px; height: 60px; background: none; border: none;
    cursor: pointer; opacity: 0;
  }
  .tw-transport { display: flex; gap: 8px; margin-top: 4px; }
  .tw-tbtn {
    flex: 1; display: grid; place-items: center; cursor: pointer;
    background: rgba(0, 0, 0, 0.35); border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 9px; padding: 10px 0; color: rgba(255, 255, 255, 0.72);
    transition: all .15s ease;
  }
  .tw-tbtn:hover { color: #fff; background: rgba(255, 255, 255, 0.1); }
  .tw-tbtn.on { color: #fff; background: rgba(255, 255, 255, 0.14); border-color: rgba(255, 255, 255, 0.22); }
  @media (prefers-reduced-motion: reduce) { .tw-panel { animation: none; } }
  .tw-head { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 2px; }
  .tw-div { height: 1px; background: rgba(255, 255, 255, 0.08); margin: 16px 0; }
  .tw-title { font-size: 19px; font-weight: 600; letter-spacing: .01em; }
  .tw-x {
    background: none; border: none; cursor: pointer; padding: 4px; line-height: 0;
    color: rgba(255, 255, 255, 0.55); transition: color .15s ease;
  }
  .tw-x:hover { color: #fff; }
  .tw-group { margin-top: 18px; }
  .tw-glabel { font-size: 15px; font-weight: 500; color: rgba(255, 255, 255, 0.55); margin-bottom: 10px; }
  .tw-row { margin-top: 12px; }
  .tw-labelrow { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 5px; }
  .tw-label { font-size: 13px; color: rgba(255, 255, 255, 0.55); }
  .tw-val { font-size: 13px; color: rgba(255, 255, 255, 0.9); font-variant-numeric: tabular-nums; }
  .tw-select, .tw-numbox {
    width: 100%; appearance: none; -webkit-appearance: none;
    background: rgba(0, 0, 0, 0.35); color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 9px;
    padding: 10px 34px 10px 13px; font: inherit; cursor: pointer;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23ffffff99' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat: no-repeat; background-position: right 11px center;
  }
  .tw-select:focus, .tw-numbox:focus { outline: none; border-color: rgba(255, 255, 255, 0.3); }
  .tw-select option { background: #1a1b1f; color: #fff; }
  .tw-numbox {
    background-image: none; padding-right: 13px; cursor: text; font-weight: 500;
    text-align: left; display: flex; align-items: center; justify-content: space-between;
  }
  .tw-input {
    width: 100%; box-sizing: border-box; background: rgba(0, 0, 0, 0.35); color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 9px;
    padding: 10px 13px; font: inherit;
  }
  .tw-input:focus { outline: none; border-color: rgba(255, 255, 255, 0.3); }
  .tw-input::placeholder { color: rgba(255, 255, 255, 0.35); }
  input[type=range].tw-range {
    width: 100%; -webkit-appearance: none; appearance: none; height: 4px; border-radius: 99px;
    background: rgba(255, 255, 255, 0.18); outline: none; margin: 4px 0 2px; cursor: pointer;
  }
  input[type=range].tw-range::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: #f2f2f2; box-shadow: 0 1px 4px rgba(0,0,0,.5); cursor: pointer;
  }
  input[type=range].tw-range::-moz-range-thumb {
    width: 16px; height: 16px; border: none; border-radius: 50%;
    background: #f2f2f2; box-shadow: 0 1px 4px rgba(0,0,0,.5); cursor: pointer;
  }
  .tw-seg {
    display: flex; background: rgba(0, 0, 0, 0.35); border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 9px; padding: 3px; gap: 3px;
  }
  .tw-seg button {
    flex: 1; background: none; border: none; border-radius: 6px; cursor: pointer;
    color: rgba(255, 255, 255, 0.6); font: inherit; padding: 7px 0; transition: all .15s ease;
  }
  .tw-seg button:hover { color: #fff; }
  .tw-seg button.on { background: rgba(255, 255, 255, 0.12); color: #fff; font-weight: 500; }
  /* ── "More like this" model steering ── */
  .tw-clear { background: none; border: none; cursor: pointer; font: 500 12px 'Space Grotesk', sans-serif; color: rgba(255,255,255,.5); padding: 0; transition: color .15s ease; }
  .tw-clear:hover { color: #fff; }
  .tw-hint { font-size: 12.5px; line-height: 1.5; color: rgba(255,255,255,.42); }
  .mv-collection { display: flex; flex-wrap: wrap; gap: 7px; }
  /* Per-panel chip bar over the hovered media (revealed on hover). */
  .mv-bar { position: absolute; left: 0; right: 0; bottom: 0; z-index: 15; display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; align-items: flex-end; padding: 40px 14px 14px; background: linear-gradient(to top, rgba(0,0,0,.62), rgba(0,0,0,0)); opacity: 0; transition: opacity .25s ease; pointer-events: none; }
  .mv-bar.show { opacity: 1; pointer-events: auto; }
  .mv-chip { max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer;
    font: 500 11.5px/1.2 'Space Grotesk', sans-serif; letter-spacing: .01em; color: rgba(255,255,255,.9);
    background: rgba(20,21,26,.72); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.16); border-radius: 999px; padding: 6px 12px; transition: all .15s ease; }
  .mv-chip:hover { border-color: rgba(255,255,255,.45); color: #fff; }
  .mv-chip.on { background: rgba(255,255,255,.92); color: #0b0b0d; border-color: #fff; font-weight: 600; }
  .tw-acct {
    margin-top: 12px; display: flex; align-items: center; gap: 11px;
    background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px; padding: 11px 13px;
  }
  .tw-avatar {
    width: 34px; height: 34px; border-radius: 50%; flex: none;
    display: grid; place-items: center; font-weight: 600; font-size: 15px; color: #0b0b0d;
    background: linear-gradient(135deg, #7ea8ff, #3ad6a0);
  }
  .tw-acct-name { font-weight: 500; font-size: 14px; }
  .tw-acct-sub { font-size: 12px; color: rgba(255, 255, 255, 0.5); }
  .tw-btn {
    width: 100%; margin-top: 12px; cursor: pointer; border-radius: 10px;
    padding: 11px 14px; font: 500 14px 'Space Grotesk', sans-serif;
    border: 1px solid rgba(255, 255, 255, 0.14); background: rgba(255, 255, 255, 0.06);
    color: #fff; transition: background .15s ease;
    display: flex; align-items: center; justify-content: center; gap: 9px;
  }
  .tw-btn:hover { background: rgba(255, 255, 255, 0.13); }
  .tw-btn:disabled { opacity: .5; cursor: default; }
  .tw-btn.ghost { border-color: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.7); background: none; margin-top: 0; width: auto; padding: 7px 12px; font-size: 12.5px; }
  .tw-btn.ghost:hover { color: #fff; background: rgba(255, 255, 255, 0.08); }
</style>

<!-- ── WebGPU shader filters (inlined; exposed on window.__shaderFX) ──────────
     Drives @basementstudio/shader-lab: one WebGPU canvas per collage layer.
     Pulls the package from esm.sh on demand; degrades to plain media where
     WebGPU is unavailable. -->
<script type="module">
  const PKG = "https://esm.sh/@basementstudio/shader-lab@1.3.14?deps=three@0.183.0&exports=ShaderLabCanvasSource";

  function supportsWebGPU() {
    return typeof navigator !== "undefined" && "gpu" in navigator;
  }

  // shader-lab's createVideoTexture makes its own <video> without crossOrigin;
  // WebGPU texture upload requires CORS-clean frames. Default every dynamically
  // created video to anonymous CORS (image.civitai.com allows it).
  if (!window.__slVideoCorsPatch) {
    window.__slVideoCorsPatch = true;
    const orig = document.createElement.bind(document);
    document.createElement = (tag, ...rest) => {
      const el = orig(tag, ...rest);
      if (String(tag).toLowerCase() === "video") {
        try { el.crossOrigin = "anonymous"; } catch (e) {}
      }
      return el;
    };
  }

  let modP = null;
  const loadMod = () => (modP ??= import(PKG));

  const FILTERS = [
    "halftone", "dithering", "crt", "ascii", "pixelation",
    "edge-detect", "posterize", "ink", "chromatic-aberration"

  // Soft, unique multicolour "mesh" gradient — the placeholder shown while a
  // panel's media loads or if a URL fails. Pure CSS (near-zero weight, GPU
  // composited); every call yields a different palette so no two panels match.
  makeGradient() {
    const rnd = (a, b) => a + Math.random() * (b - a);
    const h0 = rnd(0, 360);
    // Analogous pair + a contrasting accent → colourful but harmonious.
    const hues = [h0, (h0 + rnd(25, 55)) % 360, (h0 + rnd(150, 210)) % 360];
    const blobs = hues.map(hh => {
      const x = rnd(8, 92) | 0, y = rnd(8, 92) | 0;
      const s = rnd(55, 78) | 0, l = rnd(34, 56) | 0, a = rnd(0.55, 0.9).toFixed(2);
      const r = rnd(45, 70) | 0;
      return "radial-gradient(circle at " + x + "% " + y + "%, hsla(" + (hh | 0) + "," + s + "%," + l + "%," + a + ") 0%, transparent " + r + "%)";
    });
    // Dark diagonal base grounds the blobs into the app's near-black canvas.
    const base = "linear-gradient(135deg, hsl(" + (h0 | 0) + ",42%,9%), hsl(" + ((h0 + 50) % 360 | 0) + ",46%,6%))";
    return blobs.join(", ") + ", " + base;
  }

  // A slow, unique drift for each panel's placeholder: random period, a random
  // negative delay to desync panels, and a random ping-pong direction.
  makeAnim() {
    const rnd = (a, b) => a + Math.random() * (b - a);
    const dur = rnd(18, 34).toFixed(1);
    const delay = (-rnd(0, +dur)).toFixed(1);
    const dir = Math.random() < 0.5 ? "alternate" : "alternate-reverse";
    return "meshDrift " + dur + "s ease-in-out " + delay + "s infinite " + dir;
  }

  // Randomised params for a WebGPU generative-gradient placeholder (shader-lab's
  // multi-point animated mesh). Unique palette, positions and seed per panel.
  makeGradParams() {
    const rnd = (a, b) => a + Math.random() * (b - a);
    const hslHex = (h, s, l) => {
      s /= 100; l /= 100;
      const k = n => (n + h / 30) % 12;
      const a = s * Math.min(l, 1 - l);
      const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
      const th = x => Math.round(x * 255).toString(16).padStart(2, "0");
      return "#" + th(f(0)) + th(f(8)) + th(f(4));
    };
    const h0 = rnd(0, 360);
    const hues = [h0, (h0 + rnd(25, 55)) % 360, (h0 + rnd(150, 210)) % 360, (h0 + rnd(300, 345)) % 360];
    // Saturated but dark so blobs read as deep, moody colour against the near-black app.
    const points = hues.map(hh => ({
      color: hslHex(hh, rnd(60, 82) | 0, rnd(26, 44) | 0),
      pos: [+rnd(-0.75, 0.75).toFixed(3), +rnd(-0.75, 0.75).toFixed(3)],
      weight: +rnd(0.6, 1.15).toFixed(2)
    }));
    return { points, seed: rnd(0, 100000) | 0, motionSpeed: +rnd(0.14, 0.3).toFixed(3) };
  }

  // Build a shader-lab config for one gradient placeholder from makeGradParams.
  gradConfig(gp) {
    const params = {
      activePoints: gp.points.length, noiseSeed: gp.seed, noiseType: "simplex",
      animate: true, motionSpeed: gp.motionSpeed, motionAmount: 0.24,
      warpAmount: 0.24, warpScale: 1.5, vortexAmount: 0.16, falloff: 2.1,
      grainAmount: 0.05, glowStrength: 0.05, tonemapMode: "aces",
      vignetteStrength: 0.55, vignetteRadius: 0.82, vignetteSoftness: 0.5
    };
    gp.points.forEach((p, idx) => {
      const n = idx + 1;
      params["point" + n + "Color"] = p.color;
      params["point" + n + "Position"] = p.pos;
      params["point" + n + "Weight"] = p.weight;
    });
    return {
      layers: [{
        id: "grad", kind: "source", type: "gradient", name: "gradient",
        blendMode: "normal", compositeMode: "normal", hue: 0, opacity: 1,
        saturation: 1, visible: true, params
      }],
      timeline: { duration: 6, loop: true, tracks: [] }
    };
  }

  initPanels() {
    this.ensureK();
    const n = this.k;
    const prev = this.state.panels;
    this.els = {};
    this.disposeFX();
    this.disposeGrad();
    const panels = Array.from({ length: n }, (_, i) => {
      if (prev[i]) return prev[i]; // preserve existing panel + its media on count change
      const m = this.nextMedia() || { url: "", type: "image", a: 1 };
      return { front: 0, a: m.a || 1, bg: this.makeGradient(), bgAnim: this.makeAnim(), grad: this.makeGradParams(), layers: [
        { url: m.url, type: m.type, a: m.a || 1, opacity: 0, tries: 0, fresh: true, out: false, filter: this.props.filter, mv: m.mv || [] },
        { url: "", type: "image", a: 1, opacity: 0, tries: 0, fresh: true, out: false }
      ]};
    });
    this.setState({ panels });
  }

  startTimer() {
    clearInterval(this.timer);
    this.timer = setInterval(() => {
      if (this.state.paused || document.hidden || !this.state.panels.length) return;
      this.advance(this.tick++ % this.k);
    }, this.cfg.interval);
  }

  advance(i) {
    const m = this.nextMedia(); if (!m) return;
    const panels = this.state.panels.slice();
    const p = panels[i]; if (!p) return;
    const back = 1 - p.front;
    const layers = p.layers.slice();
    layers[back] = { url: m.url, type: m.type, a: m.a || 1, opacity: 0, tries: 0, fresh: true, out: false, filter: this.props.filter, mv: m.mv || [] };
    panels[i] = { ...p, layers };
    this.setState({ panels });
    // Wake the generative placeholder while the incoming media loads behind it.
    const g = this.gradSlots[i]; if (g && g.source) g.source.setRunning(true);
    this.updateCount(); // layout manager (B): slow, hysteretic count re-evaluation
  }

  // Filter switch, done like a media advance: drop the SAME media into each
  // panel's hidden back layer tagged with the new filter, then let the normal
  // onLoaded crossfade take over. The visible front keeps its old filter until
  // the new one has rendered off-screen — so the swap is smooth, never blank.
  applyFilter(newFilter) {
    const panels = this.state.panels.map(p => {
      const f = p.layers[p.front];
      // No media shown yet → nothing to crossfade; upcoming media picks up props.filter.
      if (!f || !f.url) return p;
      const back = 1 - p.front;
      const layers = p.layers.slice();
      layers[back] = { url: f.url, type: f.type, a: f.a || p.a || 1, opacity: 0, tries: 0, fresh: true, out: false, filter: newFilter, mv: f.mv || [] };
      return { ...p, layers };
    });
    this.setState({ panels });
  }

  onLoaded(i, li) {
    const panels = this.state.panels.slice();
    const p = panels[i]; if (!p) return;
    const layers = p.layers.map((L, x) => ({ ...L, opacity: x === li ? 1 : 0, fresh: false, out: x !== li }));
    // Promote the now-front layer's aspect to the panel → its base size retargets under the existing 0.7s ease.
    panels[i] = { ...p, layers, front: li, a: (p.layers[li] && p.layers[li].a) || p.a || 1 };
    this.setState({ panels });
    setTimeout(() => {
      const p = this.state.panels[i]; if (!p) return;
      p.layers.forEach((L, x) => {
        const el = this.els[i + ":" + x];
        if (el && el.tagName === "VIDEO") {
          if (x === li) { el.play().catch(() => {}); }
          else setTimeout(() => { try { el.pause(); } catch (e) {} }, 1900);
        }
      });
      // FX mode: once the crossfade is over, stop rendering the hidden layer.
      const other = this.fxSlots[i + ":" + (1 - li)];
      const shown = this.fxSlots[i + ":" + li];
      if (shown && shown.source) shown.source.setRunning(true);
      if (other && other.source) setTimeout(() => { if (other.source) other.source.setRunning(false); }, 1900);
      // Media now covers the panel — stop rendering the generative placeholder.
      const g = this.gradSlots[i];
      if (g && g.source) setTimeout(() => { if (g.source) g.source.setRunning(false); }, 2000);
      this.persistDisplay(); // cache the now-displayed media (only after load)
      this.syncAudio();
    }, 0);
  }

  onError(i, li) {
    const m = this.nextMedia(); if (!m) return; // pre-fetch: leave current media as-is
    const panels = this.state.panels.slice();
    const p = panels[i]; if (!p || p.layers[li].tries > 6) return;
    // dead visible front (e.g. stale restored url) → retry via back buffer so front stays up
    const target = (li === p.front && p.layers[li].opacity) ? (1 - p.front) : li;
    const layers = p.layers.slice();
    layers[target] = { url: m.url, type: m.type, a: m.a || 1, opacity: 0, tries: p.layers[li].tries + 1, fresh: true, out: false, filter: this.props.filter, mv: m.mv || [] };
    panels[i] = { ...p, layers };
    this.setState({ panels });
  }

  hudArm() {
    clearTimeout(this.hudT);
    this.hudT = setTimeout(() => this.setState({ hud: false }), 1600);
  }

  // ── Transport controls (surfaced in the Tweaks panel, not the HUD) ───────
  // Public instance methods so the App-level panel can drive them via ref, and
  // notify the parent so the panel's button states stay in sync.
  notifyControls() { if (this.props.onControls) this.props.onControls({ sound: this.state.sound, paused: this.state.paused }); }
  doToggleSound = () => {
    const sound = !this.state.sound;
    this.setState({ sound }, () => this.notifyControls());
    setTimeout(() => this.syncAudio(), 0);
  };
  doTogglePause = () => {
    const paused = !this.state.paused;
    this.setState({ paused }, () => this.notifyControls());
    if (this.fxMod) this.fxMod.setPaused(paused);
    Object.values(this.els).forEach(el => {
      if (el && el.tagName === "VIDEO" && el.src) { paused ? el.pause() : el.play().catch(() => {}); }
    });
  };
  doSkip = () => { const n = this.k; for (let i = 0; i < n; i++) setTimeout(() => this.advance(i), i * 160); };

  // ── WebGPU generative placeholders (shader-lab gradient source) ──────────
  // One animated gradient canvas per panel, driven by the shared shader-fx rAF
  // loop. Sits above the CSS mesh fallback and below the media layers.
  gradSlots = {};

  attachGrad(el, i) {
    if (!el) return;                          // ignore React's detach-null (see attachFX)
    const slot = this.gradSlots[i] || (this.gradSlots[i] = { el: null, source: null, pending: false });
    if (slot.el === el) return;               // same canvas already handled
    if (slot.source) { slot.source.dispose(); slot.source = null; }
    slot.el = el; slot.pending = false;
    const gp = this.state.panels[i] && this.state.panels[i].grad;
    if (!gp) return;
    this.fxReady().then(ok => {
      if (!ok || slot.el !== el || slot.pending || slot.source) return; // WebGPU off → CSS mesh shows through
      slot.pending = true;
      const r = el.getBoundingClientRect();
      this.fxMod.createSource(this.gradConfig(gp), el, r.width || 800, r.height || 600)
        .then(source => {
          slot.pending = false;
          if (slot.el !== el) { source.dispose(); return; }  // canvas swapped mid-init
          slot.source = source;
        })
        .catch(e => { slot.pending = false; console.warn("gradient placeholder init failed", e); });
    });
  }

  disposeGrad() {
    Object.values(this.gradSlots).forEach(s => { if (s.source) s.source.dispose(); });
    this.gradSlots = {};
  }

  // ── WebGPU filters (basement.studio shader-lab) ─────────────────────────
  fxSlots = {}; fxMod = null; fxAvailable = null;

  async fxReady() {
    if (this.fxAvailable === false) return false;
    if (!this.fxMod) {
      // The inlined shader module (type="module") is deferred, so it may not
      // have registered window.__shaderFX yet on the first call — wait briefly.
      for (let i = 0; i < 50 && !window.__shaderFX; i++) await new Promise(r => setTimeout(r, 20));
      this.fxMod = window.__shaderFX;
      if (!this.fxMod) { console.warn("shader-fx unavailable"); this.fxAvailable = false; return false; }
    }
    if (!this.fxMod.supportsWebGPU()) { this.fxAvailable = false; return false; }
    this.fxAvailable = true;
    return true;
  }

  attachFX(el, i, li) {
    const k = i + ":" + li;
    // NB: the ref is intentionally inline (re-run every render). Ignore the
    // transient null it fires — do NOT dispose here, or a per-render rebuild
    // loop results. Disposal happens below when a *different* element arrives
    // (a url/filter change remounts the canvas → new el → old source dropped).
    // Running every render also lets a canvas rebind after disposeFX() clears
    // the slot map without remounting (e.g. initPanels preserving panels).
    if (!el) return;
    const slot = this.fxSlots[k] || (this.fxSlots[k] = { el: null, source: null, sig: null });
    if (slot.el === el) return;
    // New canvas element (fresh mount, filter switch, or media advance): the old
    // source's WebGPU context belonged to the old canvas, so drop it first.
    if (slot.source) { slot.source.dispose(); slot.source = null; }
    slot.el = el; slot.sig = null; slot.pending = false;
    this.syncFX();
  }

  syncFX() {
    // Per-layer filter: each layer renders under its OWN L.filter, so during a
    // switch the visible front stays on the old filter while the hidden back
    // builds the new one (see applyFilter). Nothing needs FX → nothing to do.
    const anyFilter = this.state.panels.some(p => p.layers.some(L => L.url && (L.filter ?? "none") !== "none"));
    if (!anyFilter) return;
    this.fxReady().then(ok => {
      if (!ok) { this.forceUpdate(); return; }
      this.state.panels.forEach((p, i) => p.layers.forEach((L, li) => {
        const filter = L.filter ?? "none";
        if (filter === "none" || !L.url) return; // plain-media layer; its source (if any) was freed on canvas unmount
        const slot = this.fxSlots[i + ":" + li];
        if (!slot || !slot.el) return;
        const sig = L.url + "|" + filter;
        if (slot.sig === sig && (slot.source || slot.pending)) return; // already built or building for this url+filter
        slot.sig = sig;
        const el = slot.el;
        const cfg = this.fxMod.buildConfig(L.url, L.type, filter);
        // The library bakes the effect shader at initialize() — setConfig can't
        // swap it — so we always build a fresh source. Filter changes land on the
        // hidden back layer, so this off-screen rebuild never shows a blank.
        if (slot.source) { slot.source.dispose(); slot.source = null; }
        slot.pending = true;
        const r = el.getBoundingClientRect();
        this.fxMod.createSource(cfg, el, r.width || 800, r.height || 600)
          .then(source => {
            slot.pending = false;
            // Bail if the slot was retargeted (new canvas/url/filter) while initializing.
            if (this.fxSlots[i + ":" + li] !== slot || slot.el !== el || slot.sig !== sig) { source.dispose(); return; }
            slot.source = source;
            setTimeout(() => this.onLoaded(i, li), 900);
          })
          .catch(e => {
            console.warn("shader-fx init failed, falling back to plain media", e);
            slot.pending = false; this.fxAvailable = false; this.forceUpdate();
          });
      }));
    });
  }

  disposeFX() {
    Object.values(this.fxSlots).forEach(s => {
      if (s.source) s.source.dispose();
    });
    this.fxSlots = {};
  }

  fxOn() {
    return (this.props.filter ?? "none") !== "none" && this.fxAvailable !== false;
  }

  mediaEl(L, i, li) {
    if (!L.url) return null;
    const fill = { position: "absolute", top: 0, left: 0, width: "100%", height: "100%", objectFit: "cover", objectPosition: "center" };
    const filter = L.filter ?? "none";
    if (filter !== "none" && this.fxAvailable !== false) {
      return React.createElement("canvas", {
        // Key carries url + filter: a media OR filter change on this layer remounts
        // a fresh canvas (attachFX rebuilds the WebGPU source), since the library
        // can't hot-swap the effect shader. Filter switches target the HIDDEN back
        // layer (applyFilter), so the rebuild happens off-screen and crossfades in.
        key: "fx" + li + "|" + filter + "|" + L.url,
        ref: (el) => this.attachFX(el, i, li),
        style: fill
      });
    }
    if (L.type === "video") {
      return React.createElement("video", {
        key: "v" + li + ":" + L.url,
        src: L.url,
        muted: true, loop: true, playsInline: true, autoPlay: true,
        ref: (el) => { const k = i + ":" + li; if (el) this.els[k] = el; else delete this.els[k]; },
        onLoadedData: () => this.onLoaded(i, li),
        onError: () => this.onError(i, li),
        style: fill
      });
    }
    return React.createElement("img", {
      key: "i" + li + ":" + L.url,
      src: L.url, alt: "",
      decoding: "async",
      onLoad: () => this.onLoaded(i, li),
      onError: () => this.onError(i, li),
      style: { ...fill, animation: "kb 26s ease-in-out infinite alternate" }
    });
  }

  // ── Persisted display cache (behaviour #3) — feed-scoped by apiQuery() + steer ──
  dispKey() { this.selIds(); const m = this._selArr; return "civitai-collage:disp:" + this.apiQuery() + (m.length ? "|m:" + m.join(",") : ""); } // m read-only → safe to share cached array

  persistDisplay() { clearTimeout(this._persistT); this._persistT = setTimeout(() => this._persistNow(), 400); }

  _persistNow() {
    clearTimeout(this._persistT); this._persistT = null;
    try {
      const arr = this.state.panels.map(p => {
        const L = p.layers[p.front];
        return L && L.url ? { url: L.url, type: L.type, a: L.a || p.a || 1, mv: L.mv || [] } : null;
      });
      const json = JSON.stringify(arr);
      if (json === this._lastPersist) return;       // dedup identical writes
      this._lastPersist = json;
      localStorage.setItem(this.dispKey(), json);
    } catch (e) { /* quota / blocked → skip silently */ }
  }

  restoreDisplay() {
    let saved = null;
    try { saved = JSON.parse(localStorage.getItem(this.dispKey())); } catch (e) {}
    if (!Array.isArray(saved) || !saved.some(x => x && x.url)) return false;
    this.ensureK();
    const n = this.k;
    this.els = {};
    const panels = Array.from({ length: n }, (_, i) => {
      const m = saved[i];
      const base = { front: 0, a: (m && m.a) || 1, bg: this.makeGradient(), bgAnim: this.makeAnim(), grad: this.makeGradParams() };
      if (m && m.url) {
        return { ...base, layers: [
          { url: m.url, type: m.type, a: m.a || 1, opacity: 1, tries: 0, fresh: true, out: false, filter: this.props.filter, mv: m.mv || [] }, // instant, no fade
          { url: "", type: "image", a: 1, opacity: 0, tries: 0, fresh: true, out: false }
        ]};
      }
      return { ...base, layers: [
        { url: "", type: "image", a: 1, opacity: 0, tries: 0, fresh: true, out: false },
        { url: "", type: "image", a: 1, opacity: 0, tries: 0, fresh: true, out: false }
      ]};
    });
    this.setState({ panels, status: "" });
    return true;
  }

  // Continuous slant: pure function of the wall clock, oscillating 3..9 vw.
  // Independent of media events; resumes seamlessly across reloads via a
  // persisted epoch. The panel's existing 0.7s transition smooths the ticks.
  slantNow() {
    const t = (Date.now() - this.slantEpoch) / this.SLANT_PERIOD;
    return 6 + 3 * Math.sin(2 * Math.PI * t); // 3..9
  }

  startSlant() {
    clearInterval(this.slantTimer);
    let e = NaN;
    try { e = parseFloat(localStorage.getItem("civitai-collage:slant-epoch")); } catch (x) {}
    if (!Number.isFinite(e)) {
      e = Date.now();
      try { localStorage.setItem("civitai-collage:slant-epoch", String(e)); } catch (x) {}
    }
    this.slantEpoch = e;
    this._slantVal = this.slantNow();
    this.slantTimer = setInterval(() => {
      if (document.hidden || this.state.paused) return; // clock-based → correct on resume
      const s = this.slantNow();
      if (Math.abs(s - this._slantVal) < 0.02) return;  // skip no-op ticks (turning points)
      this._slantVal = s;                               // renderVals still reads this live
      // Write geometry straight to the DOM — no React render. The panels' React
      // style keeps the 0.7s transition so these writes are eased identically,
      // and the next real render recomputes via the SAME slantGeom (no snap).
      const hov = this.state.hoverI, n = this.k, port = this.portrait;
      const gms = this.slantGeomAll(hov, s); // one O(n) pass, reused for every panel this tick
      for (let i = 0; i < n; i++) {
        const el = this.panelEls && this.panelEls[i];
        if (!el) continue;
        const gm = gms[i];
        if (port) {
          el.style.top = gm.start + "%";
          el.style.height = gm.size + "%";
          el.style.clipPath = "polygon(0% " + gm.tl + "%, 0% 100%, 100% " + gm.br + "%, 100% 0%)";
        } else {
          el.style.left = gm.start + "%";
          el.style.width = gm.size + "%";
          el.style.clipPath = "polygon(" + gm.tl + "% 0%, 100% 0%, " + gm.br + "% 100%, 0% 100%)";
        }
      }
    }, this.SLANT_TICK);
  }

  // Whole-array parallelogram geometry in ONE O(n) pass (was O(n²) per-call).
  // Pure read of this.state.panels + this.k (NO cached field): both the
  // direct-DOM slant ticker and renderVals call this FRESH in their own
  // synchronous pass, so O1 (ticker == render geometry) holds by construction
  // and cannot drift. Base ∝ displayed media demand, normalised so panels tile
  // the axis with NO gaps (A3/A6); last panel absorbs the float residual (Σ==100).
  slantGeomAll(hov, slant) {
    const n = this.k, ps = this.state.panels;
    const ds = []; let sum = 0;
    for (let j = 0; j < n; j++) { const d = this.demandOf(ps[j] && ps[j].a); ds.push(d); sum += d; }
    if (!(sum > 0)) sum = n;
    const g = Math.max(0, Math.min(0.9, this.props.hoverReveal ?? 0.55));
    const hv = (hov != null && hov >= 0 && hov < n);
    const bHov = hv ? (ds[hov] > 0 ? ds[hov] : (sum / n)) / sum * 100 : 0;
    const rest = 100 - bHov;
    const out = new Array(n); let cum = 0, accB = 0;
    for (let j = 0; j < n; j++) {
      let bj; if (j < n - 1) { bj = (ds[j] > 0 ? ds[j] : (sum / n)) / sum * 100; accB += bj; } else bj = 100 - accB;
      let wj;
      if (!hv || n < 2) wj = bj;
      else if (j === hov) wj = bj * (1 + g);
      else wj = rest > 0 ? bj * (1 - g * bHov / rest) : bj; // Σ-conserving shrink (proven gap-free)
      const start = cum - slant, size = wj + 2 * slant;
      const x = size ? (2 * slant / size) * 100 : 0;
      out[j] = { start, size, tl: j === 0 ? 0 : x, br: j === n - 1 ? 100 : 100 - x };
      cum += wj;
    }
    return out;
  }

  // Cached hover handlers (stable identity so panel refs/handlers don't churn).
  enter(i) { (this._enter || (this._enter = {})); return this._enter[i] || (this._enter[i] = () => { this.setState({ hoverI: i }); setTimeout(() => this.syncAudio(), 0); }); }
  leave(i) { (this._leave || (this._leave = {})); return this._leave[i] || (this._leave[i] = () => { if (this.state.hoverI === i) { this.setState({ hoverI: -1 }); setTimeout(() => this.syncAudio(), 0); } }); }

  // Fit the Pacifico title to its own length: set the SVG viewBox to the text's
  // measured bounding box so preserveAspectRatio scales it as large as it can

    textRow,
    selectRow("filter", FILTER_OPTS, "filter"),
    slider("panels", 1, 5, 1, (v) => String(v) + " max"),
    slider("slant", 0, 12, 1, (v) => v + "vw"),
    slider("hoverReveal", 0, 0.9, 0.05, (v) => (+v).toFixed(2)),
    sep(),
    transport,
    slider("intervalSec", 3, 20, 1, (v) => v + "s"),
    sep(),
    segRow("mediaType", ["video", "image", "all"]),
    selectRow("sort", SORT_OPTS),
    selectRow("period", PERIOD_OPTS),
    levelBar,
    steerRow,
    // Sign-in / account — optional, pinned to the bottom.
    h("div", { className: "tw-acct-wrap" }, account));
}

// Root: owns live settings + auth + panel state; renders the collage + Tweaks.
class App extends React.Component {
  state = { props: readProps(), open: false, user: null, authBusy: false, controls: { sound: false, paused: false }, mvNames: { ...mvNameCache } };
  collageRef = React.createRef();

  // Resolve a modelVersion's display name (lazy, cached) → re-render when it lands.
  ensureModelName = (id) => {
    if (this.state.mvNames[id] != null) return;
    fetchModelName(id).then((name) => this.setState((s) => ({ mvNames: { ...s.mvNames, [id]: name } })));
  };
  // Toggle a modelVersion in the "more like this" collection (dedup by id, URL-mirrored).
  toggleModel = (id) => {
    id = +id; if (!Number.isFinite(id)) return;
    const cur = parseModels(this.state.props.models);
    const next = cur.includes(id) ? cur.filter((x) => x !== id) : cur.concat(id);
    this.update({ models: next.join(",") });
  };

  componentDidMount() { this.handleAuth(); }

  handleControls = (c) => this.setState({ controls: c });
  togglePause = () => { const c = this.collageRef.current; if (c) c.doTogglePause(); };
  toggleSound = () => { const c = this.collageRef.current; if (c) c.doToggleSound(); };
  skip = () => { const c = this.collageRef.current; if (c) c.doSkip(); };

  async handleAuth() {
    const q = new URLSearchParams(location.search);
    if (q.get("code") || q.get("error")) {
      let pending; try { pending = JSON.parse(sessionStorage.getItem(SS_PKCE)); } catch (e) {}
      // Restore the collage settings that were in the URL before the OAuth round-trip.
      const savedSearch = (pending && pending.search) || "";
      history.replaceState(null, "", location.pathname + savedSearch);
      this.setState({ props: readProps(savedSearch) });
      if (q.get("code") && pending && q.get("state") === pending.state) {
        const { ok, body } = await oauthPostForm("/token", { grant_type: "authorization_code", code: q.get("code"), code_verifier: pending.verifier, client_id: OAUTH.clientId, redirect_uri: OAUTH.redirect });
        if (ok) setTokens(body);
      }
      sessionStorage.removeItem(SS_PKCE);
      this.setState({ open: true }); // reopen the panel so the result is visible
    }
    // Validate / display the current session.
    const t = getTokens();
    if (t && t.access_token) {
      let info = await oauthUserinfo(t.access_token);
      if (!info.ok && info.status === 401 && await oauthRefresh()) info = await oauthUserinfo(getTokens().access_token);
      if (info.ok) this.setState({ user: info.user }); else clearTokens();
    }
  }

  // Merge a settings change into props, mirror to the URL (shareable + reload-safe).
  update = (patch) => {
    const cur = this.state.props;
    let changed = false;
    for (const k in patch) if (patch[k] !== cur[k]) { changed = true; break; }
    if (!changed) return; // no-op patch (duplicate slider tick / re-click active option) → skip render+URL churn
    const props = { ...cur, ...patch };
    const q = new URLSearchParams();
    ["filter", "panels", "slant", "hoverReveal", "intervalSec", "mediaType", "sort", "period", "browsingLevel", "models", "text"]
      .forEach((k) => q.set(k, String(props[k])));
    ["controls", "caption", "labels", "fullscreen"].forEach((k) => q.set(k, props[k] ? "1" : "0"));
    history.replaceState(null, "", location.pathname + "?" + q.toString());
    this.setState({ props });
  };

  toggleTweaks = () => this.setState((s) => ({ open: !s.open }));
  closeTweaks = () => this.setState({ open: false });
  signIn = () => { this.setState({ authBusy: true }); oauthLogin().catch(() => this.setState({ authBusy: false })); };
  signOut = async () => { this.setState({ authBusy: true }); await oauthSignOut(); this.setState({ user: null, authBusy: false }); };

  render() {
    const h = React.createElement;
    // The drawer is a translucent fixed overlay (CSS): a right-anchored,
    // content-width column on desktop; full screen on mobile. It sits ON TOP of
    // the full-bleed collage (blurring the strip behind it) rather than pushing it.
    return h("div", { className: "app-shell" + (this.state.open ? " open" : "") },
      h("div", { className: "collage-cell" },
        h(Component, { ...this.state.props, authed: !!this.state.user, ref: this.collageRef, onTweaks: this.toggleTweaks, onControls: this.handleControls,
            modelNames: this.state.mvNames, onEnsureName: this.ensureModelName, onToggleModel: this.toggleModel })),
      this.state.open
        ? h(TweaksPanel, { props: this.state.props, user: this.state.user, authBusy: this.state.authBusy,
            sound: this.state.controls.sound, paused: this.state.controls.paused,
            modelNames: this.state.mvNames, onEnsureName: this.ensureModelName, onToggleModel: this.toggleModel,
            onChange: this.update, onClose: this.closeTweaks, onSignIn: this.signIn, onSignOut: this.signOut,
            onTogglePause: this.togglePause, onToggleSound: this.toggleSound, onSkip: this.skip })
        : null);
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
