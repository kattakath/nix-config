# Garnix hosted Nix CI — build selection.  (tracking: issue #58 / #64)
#
# Garnix (https://garnix.io) builds the flake outputs listed below on its own
# NATIVE builders (real aarch64-linux + aarch64-darwin, no QEMU) and reports one
# GitHub status check per built output. This is what lets CI actually BUILD the
# aarch64 host toplevels that the old QEMU-based `.github/workflows/flake-check.yml`
# could only evaluate — a QEMU build of a full NixOS toplevel would OOM. See issue #56.
#
# Matcher semantics: a matcher only matches outputs with the SAME number of
# path components. Wildcards span the system axis, so `checks.*` / `devShells.*`
# / `packages.*` pull in every system the flake exports them for
# (aarch64-darwin, x86_64-linux, aarch64-linux) — not just Garnix's x86_64-linux
# default. The host configs are named explicitly; a 1-place matcher builds their
# default `config.system.build.toplevel`.
#
# Garnix is now the SOLE multi-system CI: the previous QEMU matrix workflow
# `.github/workflows/flake-check.yml` has been removed (dual-run cutover complete)
# — see issues #59 (validation) and #60 (cutover).
builds:
  include:
    - 'checks.*'
    - 'devShells.*'
    - 'packages.*'
    - 'nixosConfigurations.nixbox'
    - 'nixosConfigurations.nixrpi'
    - 'darwinConfigurations.nixcon'
  exclude: []
