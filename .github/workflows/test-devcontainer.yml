name: Test Devcontainer

# Build + verify the devcontainer (a Features stack, no Dockerfile) on a native
# amd64/arm64 matrix. No image is published: the only expensive artifact, the
# flake devShell closure, is pushed to the public Cachix cache by flake-check.yml.
# Here we just prove the Features compose and the devShell resolves from Cachix.

on:
  pull_request:
    paths:
      - '.devcontainer/**'
      - 'flake.nix'
      - 'flake.lock'
      - 'treefmt.nix'
      - '.github/workflows/test-devcontainer.yml'
  push:
    branches:
      - main
    paths:
      - '.devcontainer/**'
      - 'flake.nix'
      - 'flake.lock'
      - 'treefmt.nix'
      - '.github/workflows/test-devcontainer.yml'
  workflow_dispatch:

# Read-only: no GHCR publish, and Cachix read is public (no token needed).
permissions:
  contents: read

concurrency:
  group: test-devcontainer-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test-devcontainer:
    name: Test Devcontainer (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            label: Linux AMD64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            label: Linux ARM64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v4.3.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v3.7.1
        with:
          use: true

      - name: Build and verify devcontainer
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3
        env:
          SHELL: /bin/bash
        with:
          platform: ${{ matrix.platform }}
          useNativeRunner: true
          push: never
          runCmd: |
            set -e
            echo "=== nix-config devcontainer verification ==="
            echo "User:" && id -un
            echo "Nix:" && nix --version
            echo "Flakes enabled:"
            nix config show 2>/dev/null | grep -i experimental-features \
              || nix show-config 2>/dev/null | grep -i experimental-features
            echo "Cachix substituter wired:"
            nix config show 2>/dev/null | grep -i ismailkattakath.cachix.org \
              || { echo "✗ ismailkattakath substituter missing from nix.conf"; exit 1; }
            echo "=== devShell warm (should resolve from Cachix, not build) ==="
            OUT=$(nix develop .#default --command true 2>&1) || { echo "$OUT"; exit 1; }
            # A from-source build here means the Cachix pull missed; downloads are fine.
            if echo "$OUT" | grep -Eq "^building '|building of "; then
              echo "⚠ devShell built from source — Cachix miss:"; echo "$OUT"
            else
              echo "✓ devShell resolved without a from-source build"
            fi
            echo "node (hooks depend on this being on PATH):" && command -v node && node --version
            echo "claude-code:" && test -x /usr/local/share/nvm/current/bin/claude \
              && /usr/local/share/nvm/current/bin/claude --version
            echo "gh:" && command -v gh && gh --version | head -1
            echo "Unfree allowed: NIXPKGS_ALLOW_UNFREE=$NIXPKGS_ALLOW_UNFREE"
            echo "Git:" && git --version
            echo "=== all checks passed ==="
