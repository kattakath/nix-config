name: flake-check

# Closes the loop the local Stop-gate defers: full multi-system evaluation.
# The host running Claude Code has no `nix`, so it validates syntax only and
# marks full evaluation "CI-deferred". This workflow IS that CI.
#
# ---------------------------------------------------------------------------
# DRVPATH CONTENT GATE — skip the expensive matrix when NOTHING changed.
# ---------------------------------------------------------------------------
# The `gate` job (mirroring build-devcontainer.yml's gate) asks Nix what every
# target the matrix verifies EVALUATES to — its input-addressed `.drvPath`, a
# pure eval, NO build — across all three systems, sha256s them into one cache
# key, and probes actions/cache for that key. A HIT means this exact flake
# closure was already validated green on main ⇒ the `check` matrix + `lint` job
# skip (saves the darwin runner, the QEMU aarch64 runner, and all builds). A
# MISS (new/changed closure, first run), a workflow_dispatch, or a diff that
# touches THIS workflow file all force `changed=true` so we never skip without
# a recorded baseline. Cross-system drvPath eval works fine on x86_64 (no arm
# runner needed for the arm64 drvPath) — build-devcontainer proves this.
#
# The baseline key is SAVED only after a fully-green matrix on a PUSH TO MAIN
# (the `baseline-save` job), so a red run never poisons the skip into a false
# green. Bias is conservative: drvPath can flip without behavior changing (a
# harmless re-validate) but can never stay the same when a target changes — so
# the gate may over-run, never under-run.
#
# ---------------------------------------------------------------------------
# REQUIRED-CHECK DESIGN — read before touching job names or branch protection.
# ---------------------------------------------------------------------------
# The `check`/`lint` legs are gated at JOB level (`if: needs.gate...`). A
# JOB-level-skipped required check reports SUCCESS; a WORKFLOW-level skip would
# leave it pending forever and wedge the PR. So the single always-run aggregate
# `flake-check-result` is the required status check — it passes iff every needed
# job is success OR skipped, and fails on any failure/cancelled.
#
# BRANCH PROTECTION: the required status check MUST be `flake-check-result`,
# NOT the individual legs. (`Scan for secrets` / gitleaks stays a separate
# required check, untouched.)
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: flake-check-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN: this workflow only reads the checkout. Cachix
# push uses CACHIX_AUTH_TOKEN (a repo secret), not GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  # GATE: does the flake's evaluated content actually differ from the last
  # green baseline? Pure drvPath eval of EVERY matrix target across all three
  # systems (no build, no realisation) → one sha256 key → actions/cache probe.
  gate:
    runs-on: ubuntu-24.04 # eval only — cheapest runner; no arm needed for arm64 drvPath
    outputs:
      changed: ${{ steps.decide.outputs.changed }}
      cache_key: ${{ steps.key.outputs.cache_key }}
    steps:
      # Checkout must precede the local composite action (the runner needs the
      # action files on disk first). fetch-depth 0 for the workflow-file diff guard.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      # Eval-only gate: Nix + git-purity stage, NO Cachix (never builds or pushes).
      - uses: ./.github/actions/nix-setup
        with:
          configure-cachix: "false"

      # Did this PR/push touch the workflow file itself? If so we ALWAYS
      # re-validate (a workflow edit changes what/how we verify, but does not
      # move any target's drvPath — so the drvPath key alone would wrongly HIT).
      - name: Detect workflow-file change
        id: wf
        run: |
          BASE=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
          fi
          touched=false
          if [ -n "$BASE" ] && git cat-file -e "$BASE" 2>/dev/null; then
            if git diff --name-only "$BASE" "${{ github.sha }}" \
                 | grep -qx '.github/workflows/flake-check.yml'; then
              touched=true
            fi
          else
            # No usable base (shallow/first push) → be conservative, force run.
            touched=true
          fi
          echo "touched=$touched" >> "$GITHUB_OUTPUT"
          echo "::notice::flake-check.yml touched in this diff: $touched"

      # drvPath is input-addressed and per-system: evaluate the FULL set of
      # targets every matrix leg verifies, on all three systems, from this one
      # x86_64 runner (cross-system drvPath eval never builds). The target set is
      # NOT hand-listed here — it is enumerated from flake.nix's single source,
      # `legacyPackages.<system>.ciTargets`, so the gate and the per-system `check`
      # legs (which read the SAME source) can never drift. --raw prints the .drv
      # store path only. The sha256 of the concatenation is the baseline key.
      - name: Evaluate all matrix drvPaths (pure eval, no build)
        id: key
        run: |
          : > /tmp/drvpaths
          for system in aarch64-darwin x86_64-linux aarch64-linux; do
            # Read the single-source target list for this system, one installable
            # per line. jq -r splits the JSON array into raw strings.
            while IFS= read -r t; do
              [ -n "$t" ] || continue
              drv="$(nix eval --raw "$t.drvPath")"
              echo "$t -> $drv"
              printf '%s\n' "$drv" >> /tmp/drvpaths
            done < <(nix eval --json ".#legacyPackages.${system}.ciTargets" | jq -r '.[]')
          done
          COMBINED="$(sha256sum /tmp/drvpaths | cut -d' ' -f1)"
          # v2: the enumeration source changed (hand list → ciTargets); the first
          # post-merge run MISSes, forcing a full run that re-saves the baseline.
          echo "cache_key=flake-check-drv-v2-${COMBINED}" >> "$GITHUB_OUTPUT"

      # Restore-only probe: a HIT means this exact drv-set was already validated
      # green on main and its baseline marker was recorded.
      - name: Probe green baseline
        id: probe
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .gate-marker
          key: ${{ steps.key.outputs.cache_key }}
          lookup-only: true

      - name: Decide changed
        id: decide
        env:
          HIT: ${{ steps.probe.outputs.cache-hit }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' }}
          WF_TOUCHED: ${{ steps.wf.outputs.touched }}
        run: |
          # Skip ONLY on a genuine cache HIT with no override. Force a full run on:
          # manual dispatch, a workflow-file edit, or a MISS (new/changed closure
          # or first-ever run) — we never skip without a recorded green baseline.
          if [ "${FORCE}" = "true" ] || [ "${WF_TOUCHED}" = "true" ] || [ "${HIT}" != "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::flake content CHANGED (or forced/workflow-edit/first-run) — running full matrix."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::flake drvPaths unchanged vs green baseline — SKIPPING matrix + lint."
          fi

  # Evaluate every system natively where possible. aarch64-linux is realized
  # via emulation on the x86_64 runner so all three of the canonical triple
  # are covered without self-hosted ARM-Linux hardware.
  #
  # NOTE: `nix flake check --system <arch>` does NOT filter outputs by system —
  # `--system` sets the Nix evaluator's own host system (a config key), and is
  # silently ignored for untrusted users in CI. Each job instead evaluates the
  # system-specific top-level derivations directly via `nix eval` (which only
  # evaluates, never builds — the separate `nix build` steps populate the cache).
  #
  # Gated behind the drvPath content gate: runs only when gate.changed is true.
  # EVAL-ONLY on every leg (drvPath eval + devShell build to warm Cachix) — no
  # heavy package builds, so the emulated aarch64-linux leg never OOMs.
  check:
    name: ${{ matrix.name }}
    needs: gate
    if: needs.gate.outputs.changed == 'true'
    runs-on: ${{ matrix.os }}
    # Cap so an emulated-aarch64 QEMU stall fails fast instead of hanging 6h.
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: aarch64-darwin
            os: macos-14            # Apple Silicon runner
            emulate: false
          - name: x86_64-linux
            os: ubuntu-24.04
            emulate: false
          - name: aarch64-linux
            os: ubuntu-24.04         # cross-eval via binfmt emulation
            emulate: true
    steps:
      # binfmt registration for the emulated aarch64-linux leg — must precede any
      # emulated build. Stays in the job (docker-specific, not part of nix-setup).
      - name: Enable aarch64 emulation
        if: matrix.emulate
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64

      # Checkout must precede the local composite action.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Nix (+ extra-platforms on the emulated leg) + Cachix (pull/push,
      # graceful on forks) + git-purity stage.
      - uses: ./.github/actions/nix-setup
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extra-nix-config: ${{ matrix.emulate && 'extra-platforms = aarch64-linux' || '' }}

      # Git purity: flakes ignore untracked files. CI checks out a clean tree,
      # but assert it explicitly so a stray generated file fails loudly.
      - name: Assert git purity (no untracked .nix)
        run: |
          untracked=$(git ls-files --others --exclude-standard -- '*.nix')
          if [ -n "$untracked" ]; then
            echo "::error::Untracked .nix files break flake evaluation:"; echo "$untracked"; exit 1
          fi

      - name: Evaluate aarch64-darwin outputs
        if: matrix.name == 'aarch64-darwin'
        run: |
          # Targets come from flake.nix's single source (ciTargets) — same list the
          # gate keys on, so the two can't drift. `nix eval` takes ONE installable,
          # so loop; `.drvPath` forces the derivation to evaluate without building.
          nix eval --json '.#legacyPackages.aarch64-darwin.ciTargets' | jq -r '.[]' \
          | while IFS= read -r t; do
            [ -n "$t" ] || continue
            echo "::group::eval $t"
            nix eval --show-trace "$t.drvPath"
            echo "::endgroup::"
          done

      # Realize the devShell closure so the Cachix post-build hook pushes it —
      # this is exactly the closure the devcontainer's `cachix use` pulls.
      # Build the devShell (populate cache) AND the nixbox-vm launcher — the
      # writeShellApplication's shellcheck only runs at BUILD time, so `nix eval`
      # above does not exercise it; this build does.
      - name: Build devShell + nixbox-vm (populate cache; runs shellcheck)
        if: matrix.name == 'aarch64-darwin'
        run: |
          nix build --print-build-logs --no-link \
            .#devShells.aarch64-darwin.default \
            .#packages.aarch64-darwin.nixbox-vm

      - name: Evaluate x86_64-linux outputs
        if: matrix.name == 'x86_64-linux'
        run: |
          # Single-source target list (ciTargets) — shared with the gate, no drift.
          nix eval --json '.#legacyPackages.x86_64-linux.ciTargets' | jq -r '.[]' \
          | while IFS= read -r t; do
            [ -n "$t" ] || continue
            echo "::group::eval $t"
            nix eval --show-trace "$t.drvPath"
            echo "::endgroup::"
          done

      - name: Build devShell (populate cache)
        if: matrix.name == 'x86_64-linux'
        run: nix build --print-build-logs --no-link .#devShells.x86_64-linux.default

      - name: Evaluate aarch64-linux outputs
        if: matrix.name == 'aarch64-linux'
        run: |
          # Single-source target list (ciTargets) — shared with the gate, no drift.
          # EVAL-ONLY (.drvPath) even for the heavy toplevels/images: this is the
          # emulated leg, so we must never `nix build` them here (QEMU OOM). Only
          # the devShell is built (below) to warm Cachix.
          nix eval --json '.#legacyPackages.aarch64-linux.ciTargets' | jq -r '.[]' \
          | while IFS= read -r t; do
            [ -n "$t" ] || continue
            echo "::group::eval $t"
            nix eval --show-trace "$t.drvPath"
            echo "::endgroup::"
          done

      # aarch64-linux is what the devcontainer runs — caching this emulated
      # closure once here is the highest-value push (saves the slow QEMU rebuild).
      - name: Build devShell (populate cache)
        if: matrix.name == 'aarch64-linux'
        run: nix build --print-build-logs --no-link .#devShells.aarch64-linux.default

  # Formatting + lint + pre-commit are all flake checks now (treefmt-nix +
  # git-hooks.nix), so CI builds the SAME derivations developers run via
  # `nix fmt` / the commit hook. No drifting ad-hoc tool invocations.
  #
  # Gated behind the same drvPath content gate as the matrix.
  lint:
    name: "lint (treefmt: nixfmt / statix / deadnix + pre-commit)"
    needs: gate
    if: needs.gate.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      # Checkout must precede the local composite action.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Nix + Cachix (pull/push, graceful on forks) + git-purity stage.
      - uses: ./.github/actions/nix-setup
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Formatting gate (fails on unformatted/lintable files)
        run: nix build --print-build-logs .#checks.x86_64-linux.formatting
      - name: Pre-commit hooks (sandboxed)
        run: nix build --print-build-logs .#checks.x86_64-linux.pre-commit

  # Aggregate required check. The single always-run branch-protection anchor:
  # it reports one stable status (`flake-check-result`) whether the legs ran or
  # were skipped by the gate. Via re-actors/alls-green it passes iff every needed
  # job is success OR skipped and fails on any failure/cancelled — so a gate-skip
  # still reports a green required check and keeps the PR mergeable.
  flake-check-result:
    name: flake-check-result
    needs: [gate, check, lint]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Decide (all needed jobs green or skipped)
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}

  # Record the GREEN baseline for the gate — ONLY after a fully-successful matrix
  # on a PUSH TO MAIN. Never save on red (would poison the skip into a false
  # green) and never on a PR (a PR's green is not the main baseline). On the next
  # run the gate restores this exact key: a HIT ⇒ this drv-set is already known
  # green ⇒ skip the matrix. The marker file content is irrelevant — presence of
  # the KEY is the signal. `needs` the aggregate too, so the save waits on the
  # whole verdict, not just the raw legs.
  baseline-save:
    needs: [gate, check, lint, flake-check-result]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check.result == 'success' && needs.lint.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Create gate marker
        run: echo "${{ needs.gate.outputs.cache_key }} @ ${{ github.sha }}" > .gate-marker
      - name: Record green baseline (gate cache)
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .gate-marker
          key: ${{ needs.gate.outputs.cache_key }}
