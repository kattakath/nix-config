name: flake-check

# Closes the loop the local Stop-gate defers: full multi-system evaluation.
# The host running Claude Code has no `nix`, so it validates syntax only and
# marks full evaluation "CI-deferred". This workflow IS that CI.
#
# ---------------------------------------------------------------------------
# DERIVATION-LEVEL EVALUATION (nix-fast-build)
# ---------------------------------------------------------------------------
# Each matrix leg (and the lint job) drives `nix-fast-build --skip-cached` —
# it runs `nix-eval-jobs` to evaluate a flake attrset in parallel and starts
# building each derivation the moment it evaluates, skipping any store path
# already in the `ismailkattakath` Cachix. This REPLACES the hand-rolled
# `nix eval …drvPath` loops + separate `nix build` devShell steps: one tool now
# evaluates AND realizes each target, in parallel, and the cachix-action
# post-build hook still pushes every realized path. There is intentionally NO
# path filter — the operator does not want a path list to maintain; every PR
# runs the full matrix (and `--skip-cached` keeps unchanged closures cheap).
# Invoked via `nix run nixpkgs#nix-fast-build --` (pinned through the flake's
# nixpkgs), mirroring the repo's `nix run nixpkgs#skopeo` idiom.
#
# ---------------------------------------------------------------------------
# REQUIRED-CHECK DESIGN — read before touching job names or branch protection.
# ---------------------------------------------------------------------------
# The single always-run aggregate job `flake-check-result` is the required
# status check, NOT the individual legs. It passes iff every needed job is
# success OR skipped and fails on any failure/cancelled — one stable context to
# anchor branch protection regardless of how the matrix evolves.
#
# BRANCH PROTECTION: the required status check MUST be `flake-check-result`,
# NOT the four legs. (`Scan for secrets` / gitleaks remains a separate required
# check untouched.)
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: flake-check-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN: this workflow only reads the checkout. Cachix
# push uses CACHIX_AUTH_TOKEN (a repo secret), not GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  # Evaluate + build every system natively where possible. aarch64-linux is
  # realized via emulation on the x86_64 runner so all three of the canonical
  # triple are covered without self-hosted ARM-Linux hardware.
  #
  # Each leg runs nix-fast-build against the SAME targets the old eval loops
  # covered (1:1 map documented per step). `--skip-cached` avoids rebuilding
  # closures already in Cachix; the cachix-action post-build hook pushes the
  # rest. The system-specific toplevels are deep config paths (not a walkable
  # derivation attrset), so nix-fast-build targets the `checks`, `packages`, and
  # `devShells` attrsets and the toplevels are realized with an explicit
  # `nix build` — preserving coverage without contorting the flake's outputs.
  check:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # Cap so an emulated-aarch64 QEMU stall fails fast instead of hanging 6h.
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: aarch64-darwin
            os: macos-14            # Apple Silicon runner
            emulate: false
          - name: x86_64-linux
            os: ubuntu-24.04
            emulate: false
          - name: aarch64-linux
            os: ubuntu-24.04         # cross-eval via binfmt emulation
            emulate: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable aarch64 emulation
        if: matrix.emulate
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            ${{ matrix.emulate && 'extra-platforms = aarch64-linux' || '' }}

      # Cachix: pull from + push to the public `ismailkattakath` cache. The
      # action installs a post-build hook, so every store path realized below
      # is pushed automatically. authToken is a write-only credential held only
      # as a repo secret; when absent (e.g. forks) push is skipped and the cache
      # is still used read-only — so this is safe to merge before the secret exists.
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ismailkattakath
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Git purity: flakes ignore untracked files. CI checks out a clean tree,
      # but assert it explicitly so a stray generated file fails loudly.
      - name: Assert git purity (no untracked .nix)
        run: |
          untracked=$(git ls-files --others --exclude-standard -- '*.nix')
          if [ -n "$untracked" ]; then
            echo "::error::Untracked .nix files break flake evaluation:"; echo "$untracked"; exit 1
          fi

      # aarch64-darwin coverage (1:1 with the old eval loop + build step):
      #   checks.aarch64-darwin.{formatting,pre-commit}  -> nix-fast-build .#checks.aarch64-darwin
      #   packages.aarch64-darwin.nixbox-vm              -> nix-fast-build .#packages.aarch64-darwin
      #   devShells.aarch64-darwin.default               -> nix-fast-build .#devShells.aarch64-darwin
      #   darwinConfigurations.nixcon…toplevel           -> nix build (deep config path)
      # nix-fast-build builds nixbox-vm too, so its writeShellApplication
      # shellcheck runs at build time exactly as before.
      - name: Evaluate + build aarch64-darwin (nix-fast-build --skip-cached)
        if: matrix.name == 'aarch64-darwin'
        run: |
          for attr in \
            .#checks.aarch64-darwin \
            .#packages.aarch64-darwin \
            .#devShells.aarch64-darwin; do
            echo "::group::nix-fast-build $attr"
            nix run nixpkgs#nix-fast-build -- \
              --skip-cached --no-nom \
              --flake "$attr" --systems aarch64-darwin
            echo "::endgroup::"
          done
      - name: Build darwin toplevel (deep config path)
        if: matrix.name == 'aarch64-darwin'
        run: |
          nix build --print-build-logs --no-link \
            .#darwinConfigurations.nixcon.config.system.build.toplevel

      # x86_64-linux coverage (1:1):
      #   packages.x86_64-linux.{dockerImage,devcontainerImage} -> nix-fast-build .#packages.x86_64-linux
      #   checks.x86_64-linux.{formatting,pre-commit}           -> nix-fast-build .#checks.x86_64-linux
      #   devShells.x86_64-linux.default                        -> nix-fast-build .#devShells.x86_64-linux
      - name: Evaluate + build x86_64-linux (nix-fast-build --skip-cached)
        if: matrix.name == 'x86_64-linux'
        run: |
          for attr in \
            .#checks.x86_64-linux \
            .#packages.x86_64-linux \
            .#devShells.x86_64-linux; do
            echo "::group::nix-fast-build $attr"
            nix run nixpkgs#nix-fast-build -- \
              --skip-cached --no-nom \
              --flake "$attr" --systems x86_64-linux
            echo "::endgroup::"
          done

      # aarch64-linux coverage (1:1, EMULATED — QEMU + extra-platforms above):
      #   packages.aarch64-linux.{dockerImage,devcontainerImage} -> nix-fast-build .#packages.aarch64-linux
      #   checks.aarch64-linux.{formatting,pre-commit}           -> nix-fast-build .#checks.aarch64-linux
      #   devShells.aarch64-linux.default                        -> nix-fast-build .#devShells.aarch64-linux
      #   nixosConfigurations.{nixbox,nixrpi}…toplevel           -> nix build (deep config paths)
      - name: Evaluate + build aarch64-linux (nix-fast-build --skip-cached)
        if: matrix.name == 'aarch64-linux'
        run: |
          for attr in \
            .#checks.aarch64-linux \
            .#packages.aarch64-linux \
            .#devShells.aarch64-linux; do
            echo "::group::nix-fast-build $attr"
            nix run nixpkgs#nix-fast-build -- \
              --skip-cached --no-nom \
              --flake "$attr" --systems aarch64-linux
            echo "::endgroup::"
          done
      - name: Build aarch64-linux toplevels (deep config paths)
        if: matrix.name == 'aarch64-linux'
        run: |
          nix build --print-build-logs --no-link \
            .#nixosConfigurations.nixbox.config.system.build.toplevel \
            .#nixosConfigurations.nixrpi.config.system.build.toplevel

  # Formatting + lint + pre-commit are all flake checks now (treefmt-nix +
  # git-hooks.nix), so CI builds the SAME derivations developers run via
  # `nix fmt` / the commit hook. nix-fast-build over `.#checks.x86_64-linux`
  # evaluates + realizes both `formatting` and `pre-commit` in parallel.
  # (The `check` matrix also covers these per system; this dedicated lint job
  # is the historical fast x86_64 gate and stays a distinct signal.)
  lint:
    name: "lint (treefmt: nixfmt / statix / deadnix + pre-commit)"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: experimental-features = nix-command flakes
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ismailkattakath
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      # Covers checks.x86_64-linux.{formatting,pre-commit} (1:1 with the old two
      # `nix build …formatting` / `…pre-commit` steps).
      - name: Lint gate (nix-fast-build .#checks.x86_64-linux --skip-cached)
        run: |
          nix run nixpkgs#nix-fast-build -- \
            --skip-cached --no-nom \
            --flake .#checks.x86_64-linux --systems x86_64-linux

  # Aggregate required check. This single always-run job is the branch-protection
  # anchor: it reports one stable status (`flake-check-result`) regardless of how
  # the matrix legs evolve, and (via re-actors/alls-green) passes iff every needed
  # job is success OR skipped and fails on any failure/cancelled. Branch
  # protection's required status check MUST be this job, not the individual legs.
  flake-check-result:
    name: flake-check-result
    needs: [check, lint]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Decide (all needed jobs green or skipped)
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
