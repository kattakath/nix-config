name: nix-ci

# Self-owned, native multi-system Nix CI.
#
# LEAN MERGE CI: this workflow does NOT build the host system toplevels
# (macos / nixpi / nixvm). Building them — especially the cold linux-rpi
# kernel — is a RELEASE-time concern handled later against
# `nixosConfigurations.*` / `darwinConfigurations.*` directly. Per PR, we:
#
#   1. BUILD the flake's lint/format checks (`.#checks.<system>` = formatting +
#      pre-commit) once per SYSTEM on that system's own native runner, and
#   2. EVALUATE each host config's toplevel (cheap: forces full module eval,
#      catching config/option/type errors) WITHOUT building it.
#
# ONE LEG PER SYSTEM, on its arch-native GitHub-HOSTED runner:
#   aarch64-linux  -> `ubuntu-24.04-arm`. Evaluates nixpi + nixvm.
#   aarch64-darwin -> `macos-latest` (Apple Silicon; a free STANDARD runner on a
#                     public repo).
#
# ALL-HOSTED (no self-hosted runners). The fleet's self-hosted runners have been
# retired ENTIRELY — there are now ZERO self-hosted runners anywhere: hosted
# native-ARM + macOS STANDARD runners are free & unlimited for public repos, Cachix
# serves the warmed closure so cold builds stay fast, and going hosted removes both
# the availability SPOF AND the public-repo fork-PR RCE surface (untrusted fork code
# never lands on our hardware). So every leg installs Nix + the kattakath substituter
# itself — no `runner.environment` guard, no fork-PR runner fallback. Day-to-day local
# aarch64-linux builds use Determinate's native Linux builder on the Mac.
#
# READ from the kattakath Cachix cache is public. WRITE needs
# CACHIX_AUTH_TOKEN (a repo secret; absent on fork PRs → push no-ops). The cache
# is warmed reactively by this workflow's push-to-main run and by release builds.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: nix-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Advisory input-freshness gate — the FlakeHub "keep your inputs fresh" best
  # practice (https://docs.determinate.systems/flakehub/best-practices/). Warns
  # (does NOT fail; fail-mode defaults off) when the nixos-unstable input in
  # flake.lock drifts stale or off a supported branch. Deliberately NOT in
  # required-checks' `needs` — it's advisory, pairing with the scheduled
  # update-flake-lock.yml that actually cuts the bump PR.
  flake-checker:
    name: flake-checker
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: DeterminateSystems/flake-checker-action@de924abd783455e8429c858962b9e43062d19da1 # v13

  # One leg per system, on its arch-native runner. fail-fast:false so one
  # leg's failure doesn't cancel the other — the aggregate required-checks
  # job decides the overall result. Each entry is its own status check
  # `build (<name>)`; required-checks (needs: [build]) is the single stable
  # branch-protection anchor, so renaming/adding legs never requires
  # re-anchoring the ruleset.
  #
  # `matrix.name` is the flake system this leg targets — it both titles the
  # check (`build (<system>)`) and selects `.#checks.<system>`.
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30 # lint + eval only; no toplevel builds
    strategy:
      fail-fast: false
      matrix:
        include:
          # aarch64-linux — evaluates both NixOS hosts (nixpi, nixvm); also builds
          # the aarch64-linux lint checks. (The nixpi sdImage is the live `nixpi`
          # toplevel already evaluated here; its image drvPath is gated separately in
          # build-installers.yml.)
          - name: aarch64-linux
            # GitHub-hosted native ARM (free & unlimited on public repos).
            runs-on: ubuntu-24.04-arm
            eval-attrs: >-
              .#nixosConfigurations.nixpi.config.system.build.toplevel.drvPath
              .#nixosConfigurations.nixvm.config.system.build.toplevel.drvPath
          # aarch64-darwin (Apple Silicon) — the sole darwin host; also builds
          # the aarch64-darwin lint checks. GitHub-hosted `macos-latest` (a free
          # STANDARD macOS runner on a public repo).
          - name: aarch64-darwin
            runs-on: macos-latest
            eval-attrs: .#darwinConfigurations.macos.system.drvPath
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # UPSTREAM Nix (NOT DeterminateSystems/nix-installer-action — that installs
      # Determinate Nix only, as of 2026-01-01).
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-substituters = https://kattakath.cachix.org
            extra-trusted-public-keys = kattakath.cachix.org-1:y/w6wnb4ZArdlbfWJ82c81uCXeYgG/sGDUYCszavmEw=

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: kattakath
          authToken: ${{ github.event_name == 'push' && secrets.CACHIX_AUTH_TOKEN || '' }}

      # Flakes evaluate the git tree, not the working dir — stage everything
      # BEFORE any nix invocation (see .claude/rules/git-purity.md).
      - name: Stage tree (git purity)
        run: git add -A

      # Build this leg's SYSTEM lint/format checks and push to Cachix.
      - name: Build lint checks + push to Cachix
        env:
          CACHIX_AUTH_TOKEN: ${{ github.event_name == 'push' && secrets.CACHIX_AUTH_TOKEN || '' }}
        run: |
          # Pinned to a specific rev (as of 2026-07-05; no newer release tag
          # exists yet) rather than the default branch, matching this repo's
          # convention of not executing unpinned upstream refs in CI.
          nix run github:Mic92/nix-fast-build/561be51b96d376c9c6c49a063cfdc83af81f4929 -- \
            --skip-cached --no-nom \
            --flake ".#checks.${{ matrix.name }}" \
            --cachix-cache kattakath

      # EVALUATE (not build) this leg's host config(s). Resolving each toplevel's
      # .drvPath forces a full module-system eval, so a broken config (bad option,
      # type error, missing module) fails CI in seconds — without paying for the
      # actual build. Building is deferred to release / on-machine activation.
      - name: Evaluate host config(s) (no build)
        if: matrix.eval-attrs != ''
        env:
          EVAL_ATTRS: ${{ matrix.eval-attrs }}
        run: |
          set -euo pipefail
          for a in $EVAL_ATTRS; do
            echo "::group::eval $a"
            nix eval --raw "$a" && echo
            echo "::endgroup::"
          done
          echo "✓ host config(s) evaluate."

  # Aggregate gate — the ONE stable-named required check branch protection anchors
  # to. Runs even if a leg fails (if: always()) and fails if any leg failed or was
  # cancelled. Renaming/adding build legs never requires re-anchoring the ruleset.
  required-checks:
    name: required-checks
    needs: [build]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Verify all build legs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "✗ One or more build legs failed or were cancelled."
            exit 1
          fi
          echo "✓ All build legs passed."
