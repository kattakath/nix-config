# gitleaks secret-scanning workflow
#
# Gitleaks scans the full git history (and any new commits / PR diffs) for
# accidentally committed secrets: API keys, tokens, passwords, private keys,
# and hundreds of other credential patterns. It catches mistakes before they
# reach production or public forks.
#
# Runs on every push to main, every pull request, on a weekly schedule, and
# on demand via workflow_dispatch. Full history is checked out (fetch-depth: 0)
# so gitleaks can audit all past commits, not just the latest one.

name: gitleaks

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly scan — Sunday 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: read the checked-out history, plus PR commits — on
# pull_request events gitleaks-action lists the PR's commits via the API,
# which requires pull-requests:read (else it 403s before scanning).
permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history required — gitleaks walks every commit
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
