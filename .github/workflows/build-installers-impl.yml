name: build-installers-impl

# REUSABLE workflow: builds + publishes the LIVE nixpi SD image to the rolling
# installer-latest GitHub release. Called ONLY by build-installers.yml, and ONLY
# when its `gate` job decides the image changed. Nothing triggers this file
# directly — `on: workflow_call` means it never appears as its own run in the
# Actions list.
#
# WHY A REUSABLE WORKFLOW. The ~1h build must be SKIPPED wholesale when the gate
# says nothing changed (the cold RPi kernel — see build-installers.yml's gate).
# Isolating the write-token'd build in its own called workflow lets the caller gate
# it with a single `if:` on ONE job (`installers`): skipped ⇒ one clean `installers`
# job in the UI; running ⇒ `installers / build (nixpi-sd-img)`.
# (Was a two-leg matrix when it also published the nixvm-installer ISO; that leg was
# removed — the ISO is built on demand for a nixvm reinstall, not prebuilt/published.)

on:
  workflow_call:

# READ-ONLY by default; the Release upload's `contents: write` is scoped to the
# build job only (and is capped by the caller's own grant).
permissions:
  contents: read

jobs:
  build:
    name: build (nixpi-sd-img)
    # The ONLY job that writes GitHub state (the installer-latest Release upload).
    permissions:
      contents: write
    # SELF-HOSTED `nixvm` (aarch64-linux). Policy: NO heavy build ever runs on a
    # (paid) GitHub-hosted runner — long nix builds belong on our own hardware.
    #
    # This was GitHub-hosted (`ubuntu-24.04-arm`) back when the leg built the nixvm
    # INSTALLER ISO, for two reasons that NO LONGER hold now it builds the nixpi
    # image instead:
    #   1. CIRCULARITY — GONE. Building the nixvm ISO on nixvm meant the VM was the
    #      only thing that could rebuild itself (useless once the VM is dead). But
    #      nixvm building *nixpi*'s image is not circular — different host.
    #   2. STARVATION — ACCEPTED + BOUNDED. A ~1h COLD build occupies the sole nixvm
    #      runner, blocking nix-ci's aarch64-linux leg for any concurrent job. But
    #      build-installers fires only on MAIN-PUSH affecting the nixpi closure (not
    #      per-PR), and nixvm's PERSISTENT store keeps the RPi kernel warm between
    #      runs — so it is ~1h cold once, then minutes. (If nixvm is offline the run
    #      simply queues until it returns — the intended tradeoff for a personal fleet.)
    #
    # Because the runner is self-hosted it already ships Nix (flakes enabled) AND the
    # kattakath substituter (modules/shared/nix-cache.nix) — so, unlike the old
    # GitHub-hosted setup, there is NO install-nix-action and NO cachix-action here.
    #
    # CACHIX WARM FOR ON-PI ACTIVATION. We DO push — but the nixpi SYSTEM CLOSURE
    # (the toplevel), not the image. This is the payoff nix-ci CANNOT give: nix-ci
    # only *evaluates* nixpi, never builds its toplevel, so the custom RPi kernel +
    # unfree claude-code that a `nixos-rebuild switch --flake .#nixpi` on the Pi 4
    # needs are otherwise built ON the Pi (brutally slow). We push via nix-fast-build
    # `--cachix-cache` (the SAME mechanism nix-ci uses on this runner), which pushes
    # ONLY paths built locally that aren't already substitutable — i.e. it skips
    # cache.nixos.org base paths AND anything already in kattakath (so nothing nix-ci
    # pushed is re-pushed). The pushed delta is just the kernel + unfree bits (a few
    # hundred MB), comfortably inside the 5 GB free tier. The ~1.6 GB IMAGE is built
    # SEPARATELY below (plain `nix build`, no push) and stays OUT of Cachix — it ships
    # via the Release (what `nixpi-flash --release` downloads), where a `dd`-able
    # artifact belongs.
    #
    # NOTE (operational): building the ~5.7 GB decompressed sdImage needs disk
    # headroom in nixvm's store — if a run dies on ENOSPC, grow the VM disk or GC.
    runs-on: [nixvm, aarch64-linux]
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Stage tree (git purity)
        run: git add -A

      # Build the nixpi TOPLEVEL (the on-Pi activation closure) and push its
      # locally-built delta to Cachix. Done FIRST so it does the heavy kernel build +
      # the push; the sdImage build below then reuses the toplevel and only adds the
      # image assembly. Pin matches nix-ci's (Mic92/nix-fast-build, 2026-07-05) —
      # this repo does not execute unpinned upstream refs in CI.
      - name: Warm Cachix with the nixpi system closure (for on-Pi activation)
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix run github:Mic92/nix-fast-build/561be51b96d376c9c6c49a063cfdc83af81f4929 -- \
            --skip-cached --no-nom \
            --flake ".#nixosConfigurations.nixpi.config.system.build.toplevel" \
            --cachix-cache kattakath

      - name: Build the nixpi sdImage (for the Release; reuses the toplevel above)
        # -L / --print-build-logs surfaces builder stderr directly in the CI log,
        # so a failing derivation (e.g. the RPi kernel modules-shrunk) is
        # diagnosable without a separate `nix log` on the ephemeral runner.
        run: nix build .#packages.aarch64-linux.nixpi-sd-image --out-link result --print-build-logs

      - name: Publish to installer-latest release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: installer-latest
          name: "nixpi SD image (latest)"
          body: |
            Rolling live-nixpi SD image built from `${{ github.sha }}`.

            | Image | Architecture | Use |
            |---|---|---|
            | `nixos-sd-image-*.img.zst` | aarch64-linux (RPi 4) | LIVE nixpi system (not an installer). `nix run github:kattakath/nix-config#nixpi-flash -- --disk /dev/diskN --release` flashes THIS + plants the token/Wi-Fi. Secret-free: token + Wi-Fi land on the FIRMWARE partition post-flash. |
          prerelease: true
          make_latest: false
          files: "result/sd-image/*.img*"
