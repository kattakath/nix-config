name: build-installers-impl

# REUSABLE workflow: builds + publishes BOTH prebuilt artifacts to the rolling
# installer-latest GitHub release — the LIVE nixpi SD image AND the nixvm installer
# ISO. Called ONLY by build-installers.yml, and ONLY when its `gate` job decides
# either artifact changed. Nothing triggers this file directly — `on: workflow_call`
# means it never appears as its own run in the Actions list.
#
# WHY A REUSABLE WORKFLOW. The build must be SKIPPED wholesale when the gate says
# nothing changed (the cold RPi kernel — see build-installers.yml's gate). Isolating
# the write-token'd build in its own called workflow lets the caller gate it with a
# single `if:` on ONE job (`installers`). It also sidesteps a matrix gotcha: a matrix
# job skipped by a JOB-LEVEL `if:` renders its name UNEXPANDED in the UI. Here the
# matrix lives INSIDE the reusable workflow and is gated at the CALLER (the
# `installers` job's `if:`), so when this workflow runs at all, every matrix cell
# expands cleanly: `installers / build (nixpi-sd-img)` and
# `installers / build (nixvm-live-iso)`.
#
# TWO LEGS, ONE RELEASE. Both cells publish to the SAME rolling `installer-latest`
# pre-release. softprops/action-gh-release upserts assets BY FILENAME, so the
# `.img.zst` (nixpi) and `.iso` (nixvm) assets coexist on one release; each leg only
# overwrites its own asset. Both cells set an IDENTICAL release `name`/`body` (listing
# both artifacts), so the two concurrent publishes converge instead of fighting over
# the release metadata.

on:
  workflow_call:

# READ-ONLY by default; the Release upload's `contents: write` is scoped to the
# build job only (and is capped by the caller's own grant).
permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.leg.name }})
    # The ONLY job that writes GitHub state (the installer-latest Release upload).
    permissions:
      contents: write
    strategy:
      # Independent artifacts: one leg failing (e.g. a transient ISO xorriso error)
      # must NOT cancel the other's publish. record-baseline still waits for the WHOLE
      # matrix to succeed before recording the gate baseline, so a half-publish never
      # poisons the gate into skipping a still-needed republish (see build-installers.yml).
      fail-fast: false
      matrix:
        leg:
          # LIVE nixpi SD image → result/sd-image/*.img.zst. Needs the Cachix warm
          # (below) because a real `nixos-rebuild switch --flake .#nixpi` on the Pi 4
          # otherwise builds the custom RPi kernel + unfree bits ON the Pi.
          - name: nixpi-sd-img
            package: .#packages.aarch64-linux.nixpi-sd-image
            files: result/sd-image/*.img*
            warm_nixpi: true
          # nixvm installer ISO → result/iso/*.iso (asset nixos-minimal-*.iso). The
          # SSH-reachable Linux nixos-anywhere installs nixvm THROUGH. Publishing it
          # here is what lets `nix run .#nixvm-provision-iso` download a ready ISO
          # instead of building one (no Docker, no Determinate Linux builder on the Mac).
          - name: nixvm-live-iso
            package: .#packages.aarch64-linux.nixvm-installer-iso
            files: result/iso/*.iso
            warm_nixpi: false
    # SELF-HOSTED `nixvm` (aarch64-linux) for BOTH legs. Policy: NO heavy build ever
    # runs on a (paid) GitHub-hosted runner — long nix builds belong on our own
    # hardware, and this runner already ships Nix (flakes enabled) + the kattakath
    # substituter (modules/shared/nix-cache.nix), so there is NO install-nix-action
    # and NO cachix-action here.
    #
    # CIRCULARITY — building the nixvm ISO on nixvm ITSELF (the VM that produces its
    # own installer) is a self-dependency the old GitHub-hosted leg was designed to
    # avoid. We ACCEPT it deliberately here, because the whole point of publishing the
    # ISO is that a prebuilt copy already sits on installer-latest: recovering a dead
    # nixvm DOWNLOADS the last-published ISO, it does not build one. The self-dependency
    # only bites in the narrow case where the ISO derivation CHANGED *and* nixvm is
    # simultaneously offline — and the ISO (installation-cd-minimal + a tiny host file)
    # changes rarely. If it ever does bite, build the ISO on any other aarch64-linux
    # box (`nix build .#nixvm-installer-iso`) or `workflow_dispatch` once nixvm is back.
    #
    # STARVATION — mitigated by nixvm's 2-runner pool. A long build occupies ONE of
    # nixvm's TWO github-nix-ci runners (hosts/nixvm.nix sets `num = 2`), leaving the
    # OTHER free for nix-ci's aarch64-linux leg. Both legs of THIS matrix can also run
    # concurrently across the two slots. Builds fire only on MAIN-PUSH affecting a
    # published closure (not per-PR), and nixvm's PERSISTENT store keeps the RPi kernel
    # warm between runs. (If nixvm is entirely offline the run queues until it returns.)
    #
    # CACHIX WARM FOR ON-PI ACTIVATION (nixpi leg only). We push the nixpi SYSTEM
    # CLOSURE (the toplevel), NOT the image, via nix-fast-build `--cachix-cache` — it
    # pushes only locally-built paths not already substitutable (the kernel + unfree
    # bits, a few hundred MB, inside the 5 GB free tier). The ISO leg does NOT warm
    # Cachix: nothing activates the installer closure on-device, so there is no payoff.
    # The finished IMAGE and ISO are built by plain `nix build` (no push) and ship via
    # the Release, where a `dd`/boot-able artifact belongs.
    #
    # NOTE (operational): building the ~5.7 GB decompressed sdImage needs disk
    # headroom in nixvm's store — if a run dies on ENOSPC, grow the VM disk or GC.
    runs-on: [nixvm, aarch64-linux]
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Stage tree (git purity)
        run: git add -A

      # Build the nixpi TOPLEVEL (the on-Pi activation closure) and push its
      # locally-built delta to Cachix. nixpi leg ONLY (see runs-on comment). Done
      # FIRST so it does the heavy kernel build + the push; the sdImage build below
      # then reuses the toplevel and only adds the image assembly. Pin matches
      # nix-ci's (Mic92/nix-fast-build, 2026-07-05) — this repo does not execute
      # unpinned upstream refs in CI.
      - name: Warm Cachix with the nixpi system closure (for on-Pi activation)
        if: matrix.leg.warm_nixpi
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix run github:Mic92/nix-fast-build/561be51b96d376c9c6c49a063cfdc83af81f4929 -- \
            --skip-cached --no-nom \
            --flake ".#nixosConfigurations.nixpi.config.system.build.toplevel" \
            --cachix-cache kattakath

      - name: Build ${{ matrix.leg.name }} (for the Release)
        # -L / --print-build-logs surfaces builder stderr directly in the CI log,
        # so a failing derivation (e.g. the RPi kernel modules-shrunk, or the ISO
        # xorriso step) is diagnosable without a separate `nix log` on the runner.
        run: nix build ${{ matrix.leg.package }} --out-link result --print-build-logs

      - name: Publish to installer-latest release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: installer-latest
          # IDENTICAL across both matrix cells so concurrent publishes converge on the
          # same release metadata instead of flip-flopping it.
          name: "nixpi SD image + nixvm installer ISO (latest)"
          body: |
            Rolling prebuilt fleet artifacts, last built from `${{ github.sha }}`.

            | Asset | Architecture | Use |
            |---|---|---|
            | `nixos-sd-image-*.img.zst` | aarch64-linux (RPi 4) | LIVE nixpi system (not an installer). `nix run github:kattakath/nix-config#nixpi-flash -- --disk /dev/diskN --release` flashes THIS + plants the token/Wi-Fi. Secret-free: token + Wi-Fi land on the FIRMWARE partition post-flash. |
            | `nixos-minimal-*.iso` | aarch64-linux | nixvm INSTALLER ISO. `nix run github:kattakath/nix-config#nixvm-provision-iso` downloads it + creates the disk; then `nixos-anywhere --flake .#nixvm` installs THROUGH it. Boots `nixos@nixvm-installer.local`. |
          prerelease: true
          make_latest: false
          files: ${{ matrix.leg.files }}
