name: build-installers-impl

# REUSABLE workflow: builds + publishes the ONE prebuilt artifact to the rolling
# installer-latest GitHub release — the LIVE nixpi SD image. Called ONLY by
# build-installers.yml, and ONLY when its `gate` job decides the image changed.
# Nothing triggers this file directly — `on: workflow_call` means it never appears
# as its own run in the Actions list.
#
# WHY A REUSABLE WORKFLOW. The build must be SKIPPED wholesale when the gate says
# nothing changed (the cold RPi kernel — see build-installers.yml's gate). Isolating
# the write-token'd build in its own called workflow lets the caller gate it with a
# single `if:` on ONE job (`installers`), and keeps the build steps reusable.
#
# GITHUB-HOSTED (ubuntu-24.04-arm). Runs on a free-for-public-repo hosted ARM runner
# — the fleet retired its self-hosted CI runners (see nix-ci.yml header). The heaviest
# job (cold RPi kernel, ~1h) fits inside hosted's 6h limit, and Cachix serves the
# warmed closure so it is usually minutes. Hosted lacks Nix + the substituter, so this
# workflow installs them (install-nix-action + cachix-action, same pins as nix-ci).
#
# CACHIX — WARM the toplevel, EXCLUDE the image. cachix-action pushes the paths
# realised during the build, so a real `nixos-rebuild switch --flake .#nixpi` on the
# Pi 4 SUBSTITUTES the custom RPi kernel + unfree bits instead of building them. But
# the finished multi-GB IMAGE ships via the Release (a `dd`-able artifact belongs
# there, not in the 5 GB Cachix tier), so `pushFilter` keeps it OUT of the push.
# Writes need CACHIX_AUTH_TOKEN (a repo secret); this workflow is push-to-main /
# workflow_dispatch only (never a fork PR), so the token is always available.
#
# NOTE (operational): building the ~5.7 GB decompressed sdImage needs runner disk
# headroom — hosted ubuntu-24.04-arm has ~14 GB free on / plus a larger /mnt; if a run
# ever dies on ENOSPC, point the Nix build tmp at the roomier volume.

on:
  workflow_call:

# READ-ONLY by default; the Release upload's `contents: write` is scoped to the
# build job only (and is capped by the caller's own grant).
permissions:
  contents: read

jobs:
  build:
    name: build (nixpi-sd-img)
    # The ONLY job that writes GitHub state (the installer-latest Release upload).
    permissions:
      contents: write
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # UPSTREAM Nix + the kattakath substituter (same pins as nix-ci.yml, kept
      # inline to match build-installers' own self-consistent pin choice).
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-substituters = https://kattakath.cachix.org
            extra-trusted-public-keys = kattakath.cachix.org-1:y/w6wnb4ZArdlbfWJ82c81uCXeYgG/sGDUYCszavmEw=

      # Push the build's realised closure to kattakath, EXCEPT the finished image
      # (it ships via the Release). pushFilter drops the sd-image .img* — so the
      # nixpi toplevel/kernel is warmed but the dd-able artifact stays out of the tier.
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: kattakath
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          pushFilter: "(-nixos-sd-image-|\\.img)"

      - name: Stage tree (git purity)
        run: git add -A

      - name: Build the nixpi SD image (for the Release)
        # -L / --print-build-logs surfaces builder stderr directly in the CI log, so a
        # failing derivation (e.g. the RPi kernel modules-shrunk) is diagnosable without
        # a separate `nix log` on the runner.
        run: nix build .#packages.aarch64-linux.nixpi-sd-image --out-link result --print-build-logs

      - name: Publish to installer-latest release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: installer-latest
          name: "nixpi SD image (latest)"
          body: |
            Rolling prebuilt fleet artifact, last built from `${{ github.sha }}`.

            | Asset | Architecture | Use |
            |---|---|---|
            | `nixos-sd-image-*.img.zst` | aarch64-linux (RPi 4) | LIVE nixpi system (not an installer). `nix run github:kattakath/nix-config#nixpi-flash -- --disk /dev/diskN --release` flashes THIS + plants the token/Wi-Fi. Secret-free: token + Wi-Fi land on the FIRMWARE partition post-flash. |
          prerelease: true
          make_latest: false
          files: result/sd-image/*.img*
