name: flakehub-publish

# Publish this flake to FlakeHub on every push to main (rolling releases).
#
# FlakeHub follows a TRUSTED-PLATFORM model: flakes may be published ONLY from a
# CI platform, never ad-hoc from a laptop or cloud box
# (https://docs.determinate.systems/flakehub/publishing/). This workflow is that
# trusted platform for `kattakath/nix-config`.
#
# AUTH is OIDC — `permissions: id-token: write` lets flakehub-push mint a
# short-lived token against FlakeHub. There is NO long-lived FlakeHub secret to
# store (unlike CACHIX_AUTH_TOKEN); nothing to rotate, nothing in git.
#
# ROLLING versions are `0.1.<commit-count>+rev-<git-sha>` — derived from the
# GitHub API commit count, so every push to main is a distinct release. No git
# tags required.
#
# Runs on push-to-main only (never on PRs — OIDC publishing can't run on fork
# PRs, and a PR must not cut a release) plus manual workflow_dispatch.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # A release action: do NOT cancel an in-flight publish (mirrors build-installers).
  group: flakehub-publish
  cancel-in-progress: false

permissions:
  id-token: write # OIDC — mint the short-lived FlakeHub publish token
  contents: read

jobs:
  flakehub-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # UPSTREAM Nix (NOT DeterminateSystems/nix-installer-action — that installs
      # Determinate Nix only), matching nix-ci.yml. flakehub-push needs a Nix with
      # flakes to evaluate the flake's metadata/outputs before upload.
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/flakehub-push@71f57208810a5d299fc6545350981de98fdbc860 # v6
        with:
          name: kattakath/nix-config
          visibility: public
          rolling: true
