name: build-devcontainer

# Nix-built, multi-arch devcontainer image for nix-config.
# The image is produced by `pkgs.dockerTools.streamLayeredImage`, exposed as
# packages.<linux>.devcontainerImage in flake.nix, and published to GHCR.
# .devcontainer/devcontainer.json just pulls the `image:` this builds — the
# heavyweight toolchain (a working nix + the warm devShell closure + node +
# claude-code + gh) is baked in, so create-time setup is near-zero.
#
# PRs build-only; push to main publishes :latest + :<sha12> as ONE self-contained
# OCI image index (podman manifest push --all → index + both children uploaded
# atomically, so children can never be independently GC'd). Every leg also
# smoke-tests the freshly-built image (nix develop from the warm store).
#
# This REPLACES the old features-based test-devcontainer.yml (deleted in the
# same change): that workflow built the now-removed Features stack via
# devcontainers/ci and asserted an nvm claude path that no longer exists.

on:
  pull_request:
    paths:
      - "flake.nix"
      - "flake.lock"
      - "packages/**"
      - ".devcontainer/**"
      - ".github/workflows/build-devcontainer.yml"
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "packages/**"
      - ".devcontainer/**"
      - ".github/workflows/build-devcontainer.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push the image to GHCR via GITHUB_TOKEN — no extra secret

env:
  IMAGE_NAME: devcontainer

concurrency:
  group: build-devcontainer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # GATE: evaluate the OPTIONAL Cachix token ONCE (secrets.* is not reliable in
  # every `if:` context). The build fully succeeds with or without it — no token
  # means build against cache.nixos.org + the public ismailkattakath cache only.
  config:
    runs-on: ubuntu-24.04
    outputs:
      has_cachix: ${{ steps.probe.outputs.has_cachix }}
      # Publish on a main push OR a manual dispatch (from any ref). A manual
      # workflow_dispatch is the intended force-republish path: it pairs with the
      # gate's workflow_dispatch→changed=true bypass so a maintainer can always
      # republish (e.g. after a metadata-only change like an annotation reword that
      # leaves the image drvPath — and thus the gate — unchanged). Without dispatch
      # here, is_publish stayed false on dispatch and the publish+manifest were
      # skipped despite changed=true, so a forced republish never actually happened.
      is_publish: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    steps:
      - id: probe
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          if [ -n "${CACHIX_AUTH_TOKEN}" ]; then
            echo "has_cachix=true"  >> "$GITHUB_OUTPUT"
          else
            echo "has_cachix=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CACHIX_AUTH_TOKEN absent — read-only cache, no push."
          fi

  # GATE: publish only when the image's CONTENT actually changed.
  #
  # The trigger is a path filter on flake.nix/flake.lock/packages/**, but flake.nix
  # is monolithic — a darwin host rename (m3pro→silicon→nixcon) edits flake.nix and
  # fires a full multi-arch build+publish even though the image bytes are IDENTICAL
  # (empirically: consecutive publishes produced the same digest sha256:cd12d75b…).
  # A path filter cannot tell an image-affecting flake.nix edit from an unrelated
  # one; only the derivation itself can. So we ask Nix what the image evaluates to
  # (its per-arch drvPath — pure eval, NO build, NO realisation) and compare against
  # what was last successfully published.
  #
  # Evaluating another system's drvPath does NOT build it and works fine on an
  # x86_64 runner, so both arches are computed here on one cheap ubuntu-24.04.
  # drvPath is input-addressed: it flips iff a transitive input changes
  # (devPackagesFor, extraTools, or a flake.lock bump that moves the closure) and
  # stays put for unrelated flake.nix edits — exactly the discriminator paths lack.
  # A flake.lock bump therefore flips it automatically, so the gate fully covers it.
  #
  # Mechanism: actions/cache keyed on sha256(amd64.drvPath + arm64.drvPath).
  #   cache HIT  ⇒ this exact image was already published ⇒ changed=false ⇒ SKIP.
  #   cache MISS ⇒ new/changed content (or first-ever run)  ⇒ changed=true  ⇒ PUBLISH.
  # The key is SAVED only after a SUCCESSFUL publish (in the manifest job), so a
  # failed push never poisons the baseline. First run (no cache), workflow_dispatch,
  # and any non-main ref all force changed=true — we never skip without a recorded
  # baseline, and a manual dispatch can always force a republish.
  #
  # Bias is conservative: drvPath can occasionally flip without the output bytes
  # changing (a harmless re-publish), but it can NEVER stay the same when the output
  # changes. So the gate may over-publish, never under-publish — the correct bias.
  gate:
    needs: config
    runs-on: ubuntu-24.04 # eval only — cheapest runner; no arm needed for arm64 drvPath
    outputs:
      changed: ${{ steps.decide.outputs.changed }}
      cache_key: ${{ steps.key.outputs.cache_key }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # Flakes ignore untracked files; stage before any eval (git-purity).
      - name: Stage tree (git purity)
        run: git add -A

      - name: Evaluate per-arch image drvPaths (pure eval, no build)
        id: key
        run: |
          # drvPath is per-arch by construction (system is part of the input hash),
          # so there is no single arch-independent value — evaluate BOTH. Neither
          # eval realises the closure; --raw prints the .drv store path only.
          AMD64="$(nix eval --raw .#packages.x86_64-linux.devcontainerImage.drvPath)"
          ARM64="$(nix eval --raw .#packages.aarch64-linux.devcontainerImage.drvPath)"
          echo "amd64 drv: ${AMD64}"
          echo "arm64 drv: ${ARM64}"
          COMBINED="$(printf '%s\n%s\n' "${AMD64}" "${ARM64}" | sha256sum | cut -d' ' -f1)"
          echo "cache_key=devcontainer-drv-v1-${COMBINED}" >> "$GITHUB_OUTPUT"

      # Restore-only probe: a HIT means this exact drvPair was already published.
      - name: Probe published baseline
        id: probe
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .gate-marker
          key: ${{ steps.key.outputs.cache_key }}
          lookup-only: true

      - name: Decide changed
        id: decide
        env:
          HIT: ${{ steps.probe.outputs.cache-hit }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          # Force a republish on manual dispatch or whenever there's no recorded
          # baseline (cache MISS / first-ever run). Skip only on a genuine HIT.
          if [ "${FORCE}" = "true" ] || [ "${HIT}" != "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::devcontainer image content CHANGED (or forced/first-run) — will publish."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::devcontainer image drvPath unchanged — SKIPPING publish + manifest (no-op republish avoided)."
          fi

  build:
    needs: [config, gate]
    # NATIVE runners per arch — no QEMU. Streaming a full-devShell nix closure
    # under emulation would be brutally slow, and aarch64 is what the Apple
    # Silicon devcontainer actually runs.
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            system: x86_64-linux
            arch: amd64
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        if: needs.config.outputs.has_cachix == 'true'
        with:
          name: ismailkattakath
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Flakes ignore untracked files; stage everything before any eval/build.
      - name: Stage tree (git purity)
        run: git add -A

      - name: Compute image ref
        id: ref
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=ghcr.io/${OWNER}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha12=$(echo '${{ github.sha }}' | cut -c1-12)" >> "$GITHUB_OUTPUT"

      # streamLayeredImage evaluates to a STREAM SCRIPT (not a tarball). unfree
      # (claude-code) is permitted via flake.nix's pkgsUnfreeFor.
      - name: Build devcontainer image (stream script)
        run: |
          nix build -L ".#packages.${{ matrix.system }}.devcontainerImage"
          test -x ./result

      # Smoke test the FRESHLY-BUILT image locally — every PR + push, no GHCR
      # needed. Proves the MULTI-USER model end to end exactly as the devcontainer
      # runs it: start the container as root (its entrypoint launches nix-daemon;
      # the sleep-infinity Cmd keeps it alive), then run the checks as the NON-ROOT
      # vscode user via `docker exec` — nix reaches the root daemon over the socket
      # (NIX_REMOTE=daemon) and `nix develop` resolves from the warm baked store.
      - name: Smoke test (multi-user nix works in the baked image)
        run: |
          ./result | docker load
          CID=$(docker run -d \
            -v "$PWD:/workspaces/nix-config" \
            -w /workspaces/nix-config \
            nix-config-devcontainer:latest)
          dump() {
            echo "--- nix-daemon.log ---"
            docker exec "$CID" cat /tmp/nix-daemon.log 2>/dev/null || true
            echo "--- container logs ---"
            docker logs "$CID" 2>&1 | tail -20 || true
            docker rm -f "$CID" >/dev/null 2>&1 || true
          }
          trap dump EXIT
          # Wait for the daemon socket the root entrypoint creates.
          for _ in $(seq 1 50); do
            docker exec "$CID" test -S /nix/var/nix/daemon-socket/socket && break
            sleep 0.2
          done
          docker exec -u 1000:1000 "$CID" bash -lc '
            set -e
            echo "user: $(id -un) ($(id -u):$(id -g)); NIX_REMOTE=$NIX_REMOTE"
            git config --global --add safe.directory /workspaces/nix-config
            nix --version
            nix store ping                       # proves the client reaches the root daemon
            nix config show | grep -qi ismailkattakath.cachix.org \
              || { echo "✗ cachix substituter missing from baked nix.conf"; exit 1; }
            command -v node  >/dev/null && node --version
            command -v gh    >/dev/null && gh --version | head -1
            command -v claude >/dev/null && echo "✓ claude on PATH" || { echo "✗ claude missing"; exit 1; }
            echo "=== devShell warm (should resolve from baked store via daemon, not build) ==="
            OUT=$(nix develop .#default --command true 2>&1) || { echo "$OUT"; exit 1; }
            echo "$OUT"
            # The devShell runs as the non-root vscode user against a bind-mounted
            # workspace owned by a different uid, so the git-hooks.nix pre-commit
            # installer cannot write .git/.pre-commit-config.yaml. flake.nix now
            # guards that install behind [ -w .git ] and prints a skip notice
            # instead. Assert the shellHook produced NO permission/hook errors —
            # a regression (unguarded installer) would spam these again.
            # NOTE: this whole block is inside a single-quoted bash -lc string —
            # keep it free of apostrophes/single quotes or they terminate it early.
            if echo "$OUT" | grep -Eiq "permission denied|could not lock config file|creating symlink .*\.pre-commit-config"; then
              echo "✗ shellHook emitted a pre-commit/permission error — the [ -w .git ] guard regressed:"; echo "$OUT"; exit 1
            fi
            echo "✓ shellHook clean (pre-commit install guarded on non-writable .git)"
            if echo "$OUT" | grep -Eq "^building .|building of "; then
              echo "⚠ devShell built from source — warm-store miss:"; echo "$OUT"
            else
              echo "✓ devShell resolved without a from-source build"
            fi
            echo "=== real from-scratch build through the daemon (exercises the build path) ==="
            # The warm-store checks above only READ the store; a store query never
            # acquires a build user. This proves the daemon can actually REALIZE a
            # derivation (build-users-group empty → builds as the root daemon uid).
            # nixpkgs#hello is tiny; substituted from cache.nixos.org if available,
            # built locally otherwise — either way it flows through the daemon.
            nix build --no-link --print-build-logs nixpkgs#hello \
              || { echo "✗ from-scratch build through the daemon FAILED"; exit 1; }
            echo "✓ daemon realized nixpkgs#hello"
            echo "=== smoke test passed ==="
          '

      # Publish path runs only on a main push whose image CONTENT changed.
      # The build + smoke test ABOVE stay unconditional — they are the cheap safety
      # net (Cachix substitutes the warm closure), so PRs and even no-op main pushes
      # still prove the image builds and `nix develop` resolves. Only the expensive
      # part — materialising the multi-GB archive + uploading it + the downstream
      # single-shot manifest push — is gated on gate.outputs.changed.
      #
      # SELF-CONTAINED PUBLISH (see the manifest job): this build job no longer
      # pushes a per-arch `:<sha12>-<arch>` tag to GHCR. Instead it hands the raw
      # per-arch archive to the manifest job as a workflow artifact. The manifest
      # job assembles ONE OCI image index with `podman manifest` and pushes it with
      # `--all`, so the index AND both children upload as a single atomic artifact.
      # Nothing on GHCR is left as a separate arch-tagged reference that could be
      # untagged/retagged away, which is what previously let the children get
      # garbage-collected out from under the index (the dangling-index bug, #22).
      #
      # `streamLayeredImage` emits an UNCOMPRESSED docker-archive tar; materialise
      # it to a file (NOT a pipe) — the old `./result | gzip --fast | …` stage both
      # corrupted the docker-archive transport and, under bash `pipefail`, turned an
      # early consumer exit into a spurious `gzip: … Broken pipe` failure. A file
      # removes the pipe entirely. gzip the file for transport between jobs only
      # (artifact upload is the sole consumer; podman reads the decompressed tar).
      - name: Materialise per-arch archive
        if: needs.config.outputs.is_publish == 'true' && needs.gate.outputs.changed == 'true'
        run: |
          ./result > "image-${{ matrix.arch }}.tar"
          gzip -1 "image-${{ matrix.arch }}.tar"

      - name: Upload per-arch archive artifact
        if: needs.config.outputs.is_publish == 'true' && needs.gate.outputs.changed == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: devcontainer-image-${{ matrix.arch }}
          path: image-${{ matrix.arch }}.tar.gz
          retention-days: 1
          if-no-files-found: error
          compression-level: 0 # already gzipped

  manifest:
    needs: [config, gate, build]
    if: needs.config.outputs.is_publish == 'true' && needs.gate.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Login to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v3

      - name: Compute image ref
        id: ref
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=ghcr.io/${OWNER}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha12=$(echo '${{ github.sha }}' | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - name: Download per-arch archives
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: devcontainer-image-*
          merge-multiple: true

      # SELF-CONTAINED OCI INDEX — the structural fix for the dangling-index bug.
      #
      # ROOT CAUSE (shipped once, healed by #22): the old flow pushed each per-arch
      # child under a throwaway `:<sha12>-<arch>` tag, then `docker buildx imagetools
      # create` assembled the index by COPYING each child BY DIGEST. imagetools
      # created no durable reference of its own to those children — the arch tag was
      # the ONLY thing holding them. A registry garbage-collects manifests that are
      # both untagged AND unreferenced; because those children lived as independent
      # top-level tags rather than *inside* the pushed index artifact, losing the
      # arch tags orphaned them and `:latest` became a dangling index (200 for the
      # index, 404 for both children) — `docker pull` then failed for EVERY consumer.
      # Retention hinged on keeping separate child tags forever: fragile by design.
      #
      # THE FIX: assemble the index LOCALLY with `podman manifest`, then push it with
      # `podman manifest push --all`. `--all` (podman-manifest-push(1), default true)
      # "push[es] the images mentioned in the manifest list or image index, IN
      # ADDITION to the list or index itself" — so the index and BOTH children upload
      # as ONE artifact in a single push. There are no separate child tags to lose:
      # the children are part of the index push, so a child can never be
      # independently GC'd. This eliminates the dangling-index class of bug at the
      # source rather than papering over it with permanent arch tags + a guard.
      #
      # ANNOTATIONS (protect #15): index-level OCI annotations are set with
      # `podman manifest annotate --index --annotation k=v <list>`
      # (podman-manifest-annotate(1): --index "treats arguments to the --annotation
      # option as annotation values to be set on the image index itself rather than
      # on an entry"). `--format oci` on push emits an OCI image index
      # (application/vnd.oci.image.index.v1+json), whose top-level `annotations` field
      # carries them — exactly where GHCR reads the About panel from. This is the same
      # placement `docker buildx imagetools create --annotation index:…` targeted; we
      # keep description/source/licenses in lockstep with the repo via expressions.
      #
      # Children are added straight from the docker-archive tars via
      # `podman manifest add <list> docker-archive:image.tar`
      # (podman-manifest-add(1) documents docker-archive/oci-archive transports) — no
      # intermediate registry round-trip, no skopeo format conversion: podman emits
      # OCI children when it builds the index for an --format oci push.
      - name: Assemble + push self-contained OCI index (:latest + :<sha12>)
        env:
          # nixpkgs podman/skopeo (containers/image ≥ v2) otherwise reads the runner
          # host's still-v1 /etc/containers/registries.conf and aborts before it
          # touches the archive. An empty v2 file (registry defaults only) sidesteps
          # the incompatible host config.
          CONTAINERS_REGISTRIES_CONF: ${{ runner.temp }}/registries.conf
        run: |
          set -euo pipefail
          REF="${{ steps.ref.outputs.ref }}"
          SHA="${{ steps.ref.outputs.sha12 }}"
          printf 'unqualified-search-registries = ["docker.io"]\n' \
            > "${CONTAINERS_REGISTRIES_CONF}"

          gunzip image-amd64.tar.gz image-arm64.tar.gz
          LIST="devcontainer-index"

          run_podman() { nix run nixpkgs#podman -- "$@"; }

          run_podman manifest create "${LIST}"
          run_podman manifest add "${LIST}" docker-archive:image-amd64.tar
          run_podman manifest add "${LIST}" docker-archive:image-arm64.tar

          # Index-level OCI annotations (GHCR About panel; --index targets the list).
          run_podman manifest annotate --index \
            --annotation "org.opencontainers.image.description=Multi-arch distroless devcontainer with a working Nix daemon and a warm devShell built from ${{ github.repository }}" \
            --annotation "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --annotation "org.opencontainers.image.licenses=MIT" \
            "${LIST}"

          # ONE push per tag; --all uploads index + BOTH children as a single artifact.
          # podman authenticates from the docker config docker/login-action wrote
          # (REGISTRY_AUTH_FILE points podman at docker's config.json location).
          export REGISTRY_AUTH_FILE="${HOME}/.docker/config.json"
          for TAG in latest "${SHA}"; do
            run_podman manifest push --all --format oci \
              "${LIST}" "docker://${REF}:${TAG}"
          done

      # HARD POST-PUBLISH GUARD — fail the publish if `:latest` is not actually
      # pullable. The old pipeline shipped a DANGLING INDEX: the OCI index served
      # HTTP 200 but both per-arch children 404'd, so every `docker pull` failed
      # (Codespaces prebuilds, local .devcontainer users, CI). `imagetools inspect`
      # alone does NOT catch this — it reads the index descriptors, not the child
      # bodies. The self-contained `--all` push above makes this structurally
      # impossible, but the guard STAYS as a hard assertion: it proves the invariant
      # every publish rather than trusting it, and would catch any future regression
      # (e.g. someone reintroducing separate child tags). It does three things a
      # dangling index cannot survive:
      #   1. a REAL `docker pull :latest`, which resolves + fetches a platform
      #      child (the amd64 child, on this ubuntu-24.04 runner) — 404 ⇒ failure;
      #   2. an explicit resolve of EVERY child digest the index references, so a
      #      broken child on the arch the runner did NOT pull (arm64) is still
      #      caught — a registry GET per child, 404 ⇒ failure;
      #   3. re-assert #15's index annotation survived, so a future change that
      #      silently drops it also fails here.
      - name: Verify :latest is durably pullable (children resolve)
        run: |
          set -euo pipefail
          REF="${{ steps.ref.outputs.ref }}"

          echo "::group::real docker pull ${REF}:latest (fetches a platform child)"
          docker pull "${REF}:latest"
          echo "::endgroup::"

          RAW="$(docker buildx imagetools inspect --raw "${REF}:latest")"

          # Resolve EVERY child manifest the index references. jq extracts the
          # image (platform) children; attestation/unknown descriptors have
          # platform.architecture == "unknown" and are skipped. A dangling child
          # makes `imagetools inspect <ref>@<digest>` return non-zero (registry
          # 404) and, under set -e, fails the job. Portable `while read` loop
          # (no `mapfile`) so bash version can't matter.
          DIGESTS="$(printf '%s' "$RAW" \
            | jq -r '.manifests[] | select((.platform.architecture // "") != "unknown") | .digest')"
          COUNT="$(printf '%s\n' "$DIGESTS" | grep -c '^sha256:')"
          if [ "${COUNT}" -lt 2 ]; then
            echo "✗ expected >=2 platform children in the index, found ${COUNT}"; echo "$RAW"; exit 1
          fi
          printf '%s\n' "$DIGESTS" | while IFS= read -r d; do
            [ -n "$d" ] || continue
            echo "→ resolving child ${d}"
            docker buildx imagetools inspect "${REF}@${d}" >/dev/null \
              || { echo "✗ child ${d} does NOT resolve — :latest is a DANGLING INDEX"; exit 1; }
          done
          echo "✓ all ${COUNT} child manifests resolve"

          # Protect PR #15: the index must still carry the OCI description annotation.
          printf '%s' "$RAW" \
            | jq -e '.annotations["org.opencontainers.image.description"]' >/dev/null \
            || { echo "✗ index lost org.opencontainers.image.description annotation (#15 regression)"; exit 1; }
          echo "✓ index annotations intact (org.opencontainers.image.description present)"
          echo "=== :latest is durably pullable ==="

      # Record the baseline ONLY after a fully successful publish, so a failed push
      # never poisons the cache into skipping the next (needed) republish. On the
      # next run the gate restores this exact key: a HIT means the drvPair is
      # unchanged ⇒ skip. The marker file content is irrelevant — presence of the
      # KEY is the signal. A no-op main push (e.g. a host-rename-style flake.nix
      # edit that leaves the image bytes identical) will now find this key on the
      # next run and skip the publish + this whole manifest job.
      - name: Create gate marker
        run: echo "${{ needs.gate.outputs.cache_key }} @ ${{ github.sha }}" > .gate-marker

      - name: Record published baseline (gate cache)
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .gate-marker
          key: ${{ needs.gate.outputs.cache_key }}
