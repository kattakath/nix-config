name: build-devcontainer

# Nix-built, aarch64-only devcontainer image for nix-config.
# The image is produced by `pkgs.dockerTools.streamLayeredImage`, exposed as
# packages.aarch64-linux.devcontainerImage in flake.nix, and published to GHCR.
# .devcontainer/devcontainer.json just pulls the `image:` this builds — the
# heavyweight toolchain (a working nix + the warm devShell closure + node +
# claude-code + gh) is baked in, so create-time setup is near-zero.
#
# PRs eval-only (the `gate` job's pure drvPath eval); push to main builds the
# image and publishes :latest + :<sha12>. Every merge/dispatch build leg also
# smoke-tests the freshly-built image (nix develop from the warm store).
#
# This fleet is aarch64-only (macos/nixpi/nixvm) — there is no amd64 leg and no
# manifest-list assembly step; the single arm64 image IS :latest.

on:
  pull_request:
    paths:
      - "flake.nix"
      - "flake.lock"
      - "packages/**"
      - ".devcontainer/**"
      - ".github/workflows/build-devcontainer.yml"
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "packages/**"
      - ".devcontainer/**"
      - ".github/workflows/build-devcontainer.yml"
  workflow_dispatch:

# Default token scope is READ-ONLY for every job. `packages: write` is NOT granted
# at the top level — it is scoped per-job to ONLY the job that pushes to GHCR
# (`build`) via its own `permissions:` block below (defense-in-depth). The
# eval-only `gate` job and the PR (non-publish) path therefore never receive a
# write-capable token.
permissions:
  contents: read

env:
  IMAGE_NAME: devcontainer

concurrency:
  group: build-devcontainer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # GATE: publish only when the image's CONTENT actually changed.
  #
  # The trigger is a path filter on flake.nix/flake.lock/packages/**, but flake.nix
  # is monolithic — an unrelated edit can fire a full build+publish even though the
  # image bytes are IDENTICAL. A path filter cannot tell an image-affecting
  # flake.nix edit from an unrelated one; only the derivation itself can. So we ask
  # Nix what the image evaluates to (its drvPath — pure eval, NO build, NO
  # realisation) and compare against what was last successfully published.
  #
  # drvPath is input-addressed: it flips iff a transitive input changes
  # (devPackagesFor, extraTools, or a flake.lock bump that moves the closure) and
  # stays put for unrelated flake.nix edits — exactly the discriminator paths lack.
  #
  # Mechanism: actions/cache keyed on sha256(drvPath).
  #   cache HIT  ⇒ this exact image was already published ⇒ changed=false ⇒ SKIP.
  #   cache MISS ⇒ new/changed content (or first-ever run)  ⇒ changed=true  ⇒ PUBLISH.
  # The key is SAVED only after a SUCCESSFUL publish, so a failed push never
  # poisons the baseline. First run (no cache), workflow_dispatch, and any
  # non-main ref all force changed=true — we never skip without a recorded
  # baseline, and a manual dispatch can always force a republish.
  #
  # Bias is conservative: drvPath can occasionally flip without the output bytes
  # changing (a harmless re-publish), but it can NEVER stay the same when the output
  # changes. So the gate may over-publish, never under-publish — the correct bias.
  gate:
    runs-on: ubuntu-24.04-arm # native aarch64 — cheapest correct runner for this fleet
    timeout-minutes: 15
    outputs:
      changed: ${{ steps.decide.outputs.changed }}
      cache_key: ${{ steps.key.outputs.cache_key }}
      ref: ${{ steps.ref.outputs.ref }}
      sha12: ${{ steps.ref.outputs.sha12 }}
      # Publish on a main push OR a manual dispatch (from any ref). A manual
      # workflow_dispatch is the intended force-republish path: it pairs with the
      # gate's workflow_dispatch→changed=true bypass so a maintainer can always
      # republish (e.g. after a metadata-only change that leaves the image drvPath
      # — and thus the gate — unchanged). Pure github-context expression — no
      # secret probe, so it lives on this always-running gate job.
      is_publish: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    steps:
      # Checkout must precede the local composite action.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Eval-only gate: Nix + git-purity stage, NO Cachix (no build/push).
      - uses: ./.github/actions/nix-setup
        with:
          configure-cachix: "false"

      - name: Compute image ref
        id: ref
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=ghcr.io/${OWNER}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha12=$(echo '${{ github.sha }}' | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - name: Evaluate image drvPath (pure eval, no build)
        id: key
        run: |
          # drvPath is per-arch by construction, but this fleet has exactly one
          # linux arch (aarch64-linux) — evaluate it directly. --raw prints the
          # .drv store path only; no realisation happens.
          DRV="$(nix eval --raw .#packages.aarch64-linux.devcontainerImage.drvPath)"
          echo "drv: ${DRV}"
          COMBINED="$(printf '%s\n' "${DRV}" | sha256sum | cut -d' ' -f1)"
          echo "cache_key=devcontainer-drv-v2-${COMBINED}" >> "$GITHUB_OUTPUT"

      # Restore-only probe: a HIT means this exact drvPath was already published.
      - name: Probe published baseline
        id: probe
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .gate-marker
          key: ${{ steps.key.outputs.cache_key }}
          lookup-only: true

      - name: Decide changed
        id: decide
        env:
          HIT: ${{ steps.probe.outputs.cache-hit }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          # Force a republish on manual dispatch or whenever there's no recorded
          # baseline (cache MISS / first-ever run). Skip only on a genuine HIT.
          if [ "${FORCE}" = "true" ] || [ "${HIT}" != "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::devcontainer image content CHANGED (or forced/first-run) — will publish."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::devcontainer image drvPath unchanged — SKIPPING publish (no-op republish avoided)."
          fi

  build:
    needs: [gate]
    # This job PUSHES the image to GHCR, so it needs a write-capable token —
    # scoped HERE rather than at the top level so no other job inherits it.
    # `contents: read` is restated so the job token is not otherwise widened.
    permissions:
      contents: read
      packages: write # push the image to GHCR via GITHUB_TOKEN — no extra secret
    # PR = eval-only (the `gate` job's pure `nix eval` of the image drvPath is the
    # PR signal, mirroring nix-ci.yml's host-config evals). The expensive build +
    # smoke + publish run ONLY at merge (push to main) or manual dispatch —
    # `is_publish` is true for exactly those events. build-devcontainer is not a
    # required check, so PRs stay mergeable with only `gate` having run.
    if: needs.gate.outputs.is_publish == 'true'
    runs-on: ubuntu-24.04-arm # native aarch64 — this fleet's sole linux arch
    timeout-minutes: 60
    steps:
      # Checkout must precede the local composite action.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Nix + Cachix (pull/push, graceful on forks) + git-purity stage.
      - uses: ./.github/actions/nix-setup
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # streamLayeredImage evaluates to a STREAM SCRIPT (not a tarball). unfree
      # (claude-code) is permitted via flake.nix's pkgsUnfreeFor.
      - name: Build devcontainer image (stream script)
        run: |
          nix build -L ".#packages.aarch64-linux.devcontainerImage"
          test -x ./result

      # Smoke test the FRESHLY-BUILT image locally — every publish run (push to
      # main / dispatch), no GHCR needed. Proves the MULTI-USER model end to end
      # exactly as the devcontainer runs it: start the container as root (its
      # entrypoint launches nix-daemon; the sleep-infinity Cmd keeps it alive),
      # then run the checks as the NON-ROOT vscode user via `docker exec` — nix
      # reaches the root daemon over the socket (NIX_REMOTE=daemon) and
      # `nix develop` resolves from the warm baked store.
      - name: Smoke test (multi-user nix works in the baked image)
        run: |
          ./result | docker load
          CID=$(docker run -d \
            -v "$PWD:/workspaces/nix-config" \
            -w /workspaces/nix-config \
            nix-config-devcontainer:latest)
          dump() {
            echo "--- nix-daemon.log ---"
            docker exec "$CID" cat /tmp/nix-daemon.log 2>/dev/null || true
            echo "--- container logs ---"
            docker logs "$CID" 2>&1 | tail -20 || true
            docker rm -f "$CID" >/dev/null 2>&1 || true
          }
          trap dump EXIT
          # Wait for the daemon socket the root entrypoint creates.
          for _ in $(seq 1 50); do
            docker exec "$CID" test -S /nix/var/nix/daemon-socket/socket && break
            sleep 0.2
          done
          docker exec -u 1000:1000 "$CID" bash -lc '
            set -e
            echo "user: $(id -un) ($(id -u):$(id -g)); NIX_REMOTE=$NIX_REMOTE"
            git config --global --add safe.directory /workspaces/nix-config
            nix --version
            nix store ping                       # proves the client reaches the root daemon
            nix config show | grep -qi ismailkattakath.cachix.org \
              || { echo "✗ cachix substituter missing from baked nix.conf"; exit 1; }
            command -v node  >/dev/null && node --version
            command -v gh    >/dev/null && gh --version | head -1
            command -v claude >/dev/null && echo "✓ claude on PATH" || { echo "✗ claude missing"; exit 1; }
            echo "=== devShell warm (should resolve from baked store via daemon, not build) ==="
            OUT=$(nix develop .#default --command true 2>&1) || { echo "$OUT"; exit 1; }
            echo "$OUT"
            # The devShell runs as the non-root vscode user against a bind-mounted
            # workspace owned by a different uid, so the git-hooks.nix pre-commit
            # installer cannot write .git/.pre-commit-config.yaml. flake.nix now
            # guards that install behind [ -w .git ] and prints a skip notice
            # instead. Assert the shellHook produced NO permission/hook errors —
            # a regression (unguarded installer) would spam these again.
            # NOTE: this whole block is inside a single-quoted bash -lc string —
            # keep it free of apostrophes/single quotes or they terminate it early.
            if echo "$OUT" | grep -Eiq "permission denied|could not lock config file|creating symlink .*\.pre-commit-config"; then
              echo "✗ shellHook emitted a pre-commit/permission error — the [ -w .git ] guard regressed:"; echo "$OUT"; exit 1
            fi
            echo "✓ shellHook clean (pre-commit install guarded on non-writable .git)"
            if echo "$OUT" | grep -Eq "^building .|building of "; then
              echo "⚠ devShell built from source — warm-store miss:"; echo "$OUT"
            else
              echo "✓ devShell resolved without a from-source build"
            fi
            echo "=== real from-scratch build through the daemon (exercises the build path) ==="
            # The warm-store checks above only READ the store; a store query never
            # acquires a build user. This proves the daemon can actually REALIZE a
            # derivation (build-users-group empty → builds as the root daemon uid).
            # nixpkgs#hello is tiny; substituted from cache.nixos.org if available,
            # built locally otherwise — either way it flows through the daemon.
            nix build --no-link --print-build-logs nixpkgs#hello \
              || { echo "✗ from-scratch build through the daemon FAILED"; exit 1; }
            echo "✓ daemon realized nixpkgs#hello"
            echo "=== smoke test passed ==="
          '

      # REGRESSION GUARD (see fix/devcontainer-glibc-loader): prove a FOREIGN,
      # standard-FHS glibc binary — one whose ELF PT_INTERP is the standard
      # loader path and which links libstdc++ — actually EXECUTES in the image.
      # This is the exact breakage that hid behind a green prebuild + the
      # Nix-only smoke test above: the distroless image had glibc/libstdc++ only
      # under /nix/store, so the VS Code Server's bundled generic `node` died
      # with exit 127 ("cannot execute: required file not found") and the server
      # never started. The subject under test is the REAL VS Code Server node
      # for arm64 — not a Nix-store binary (which uses its own store loader +
      # RUNPATH and would pass even if the standard loader regressed). If the
      # arch-gated /lib*/ld-linux-*.so.* symlink or the libstdc++
      # LD_LIBRARY_PATH resolution regresses, this step fails CI.
      - name: Guard — foreign glibc binary (VS Code Server node) executes
        run: |
          set -euo pipefail
          VSARCH='arm64'
          LOADER_GLOB='/lib/ld-linux-aarch64.so.1'

          # Fetch the REAL VS Code Server (the foreign generic-glibc payload the
          # devcontainer runtime downloads at connect time) for arm64. The
          # /latest/server-linux-<vsarch>/stable endpoint 302-redirects to the
          # current stable tarball; -L follows it.
          echo "::group::download VS Code Server (server-linux-${VSARCH})"
          curl -fSL --retry 3 -o /tmp/vscode-server.tgz \
            "https://update.code.visualstudio.com/latest/server-linux-${VSARCH}/stable"
          mkdir -p /tmp/vscs && tar -xzf /tmp/vscode-server.tgz -C /tmp/vscs
          NODE="$(find /tmp/vscs -maxdepth 2 -type f -name node | head -1)"
          test -n "$NODE" || { echo "✗ could not locate bundled node in VS Code Server"; exit 1; }
          echo "bundled node: $NODE"
          # Sanity: on THIS host (no loader shim) the foreign node cannot exec —
          # confirms it genuinely depends on the standard loader we provide.
          "$NODE" --version >/dev/null 2>&1 \
            && echo "note: host happened to run it (host has a standard loader)" \
            || echo "confirmed: foreign node needs the standard loader (fails on a bare distroless rootfs)"
          echo "::endgroup::"

          CID=$(docker run -d \
            -v /tmp/vscs:/vscs:ro \
            nix-config-devcontainer:latest)
          trap 'docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT

          # 1) the standard loader path must resolve (symlink → glibc).
          docker exec "$CID" test -e "$LOADER_GLOB" \
            || { echo "✗ standard loader ${LOADER_GLOB} is MISSING in the image"; exit 1; }
          echo "✓ standard loader ${LOADER_GLOB} resolves"

          # 2) the FOREIGN node must actually EXECUTE inside the image (loader +
          #    libstdc++ both resolve). This is the exit-127 regression guard.
          BUNDLED="/vscs/$(cd /tmp/vscs && find . -maxdepth 2 -type f -name node | head -1 | sed 's#^\./##')"
          OUT="$(docker exec "$CID" "$BUNDLED" --version 2>&1)" || {
            echo "✗ foreign VS Code Server node FAILED to execute in the image:"; echo "$OUT"
            echo "  → the standard glibc loader and/or libstdc++ path has regressed."; exit 1; }
          echo "✓ foreign glibc node executed in the image: $OUT"

          # 3) prove libstdc++ specifically is discoverable (node links it; a bare
          #    loader with no libstdc++ would fail here with 'cannot open libstdc++.so.6').
          echo "$OUT" | grep -Eq '^v[0-9]' \
            || { echo "✗ node produced no version string — libstdc++ likely unresolved"; exit 1; }
          echo "=== foreign-glibc execution guard passed ==="

      # REGRESSION GUARD (see fix/devcontainer-usr-bin-env): prove /usr/bin/env
      # resolves so the VS Code Server bootstrap scripts can exec. Those scripts
      # (check-requirements.sh and its siblings under
      # ~/.vscode-server/bin/<commit>/bin/helpers/) start with a `#!/usr/bin/env sh`
      # shebang; on a distroless Nix image /usr/bin/env is absent, so the kernel
      # rejects the shebang with "/usr/bin/env: bad interpreter: No such file or
      # directory" (exit 126) and the server never installs — Remote-Containers /
      # `devcontainer up` then fails to attach. This is the EXACT breakage that hid
      # behind a green build + the Nix-only smoke test (nix binaries hardcode their
      # own store shebang, never /usr/bin/env, so they pass even when it is gone).
      # Subject under test is a script whose interpreter is resolved via env — not a
      # Nix binary. If the fakeRootCommands /usr/bin/env symlink regresses, this fails.
      - name: Guard — /usr/bin/env resolves (VS Code Server shebang bootstrap)
        run: |
          set -euo pipefail
          CID=$(docker run -d nix-config-devcontainer:latest)
          trap 'docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT

          # 1) the /usr/bin/env path must exist and resolve to an executable.
          docker exec "$CID" test -x /usr/bin/env \
            || { echo "✗ /usr/bin/env is MISSING or non-executable in the image"; exit 1; }
          echo "✓ /usr/bin/env resolves"

          # 2) a script with the exact VS Code Server shebang must EXECUTE (exit 0),
          #    not die with the "bad interpreter" (126). env must find `sh` on PATH.
          docker exec "$CID" sh -c \
            'printf "#!/usr/bin/env sh\nexit 0\n" > /tmp/req.sh && chmod +x /tmp/req.sh && /tmp/req.sh' \
            || { echo "✗ '\''#!/usr/bin/env sh'\'' script failed to exec — the bootstrap-blocking regression is back"; exit 1; }
          echo "✓ #!/usr/bin/env sh script executed (exit 0)"

          # 3) env must also resolve the other interpreters the server scripts use
          #    (bash, node) via the container PATH — a partial PATH would half-break it.
          for INTERP in bash node; do
            docker exec "$CID" /usr/bin/env "$INTERP" --version >/dev/null 2>&1 \
              || { echo "✗ /usr/bin/env could not resolve/run '\''$INTERP'\'' via PATH"; exit 1; }
          done
          echo "=== /usr/bin/env bootstrap guard passed ==="

      # REGRESSION GUARD — the nix-ld library contract. The image exposes foreign
      # (non-Nix) glibc binaries' shared libs via NIX_LD_LIBRARY_PATH / LD_LIBRARY_PATH
      # sourced from the SHARED list (modules/shared/nix-ld-libraries.nix), widened
      # beyond the old gcc-lib-only set so the next foreign binary needing
      # zlib/openssl/libGL runs with no image change. This asserts the contract is
      # wired: NIX_LD points at a real loader, and a discriminator soname that is
      # ONLY present because of the widening (libz.so.1 — the old set had libstdc++
      # only) resolves on the path. A regression to the narrow set fails here.
      - name: Guard — nix-ld library contract wired (foreign-binary lib resolution)
        run: |
          set -euo pipefail
          CID=$(docker run -d nix-config-devcontainer:latest)
          trap 'docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT

          docker exec "$CID" sh -c 'test -n "$NIX_LD" && test -e "$NIX_LD"' \
            || { echo "✗ NIX_LD unset or its loader path missing"; exit 1; }
          echo "✓ NIX_LD resolves to a real loader"

          # libstdc++.so.6 = the old contract; libz.so.1 = proof of the widening.
          for SO in libstdc++.so.6 libz.so.1; do
            docker exec "$CID" sh -c '
              IFS=:; found=; for d in $NIX_LD_LIBRARY_PATH; do [ -e "$d/'"$SO"'" ] && found=1; done
              [ -n "$found" ]' \
              || { echo "✗ '"$SO"' not on NIX_LD_LIBRARY_PATH — nix-ld set regressed to narrow"; exit 1; }
            echo "✓ $SO resolves on NIX_LD_LIBRARY_PATH"
          done
          echo "=== nix-ld library contract guard passed ==="

      # REGRESSION GUARD — daemon stale-socket self-heal. A crashed nix-daemon
      # leaves the socket INODE behind; the old entrypoint's `[ ! -S socket ]` file
      # test then saw a dead socket, skipped the restart, and every client got
      # "Connection refused" (hit in production). The entrypoint now probes real
      # liveness (`nix store ping`) and reclaims a stale inode on container start.
      # This reproduces the exact scenario: bring the daemon up, kill it (leaving a
      # stale socket), `docker restart` (re-runs the entrypoint), and assert the
      # client can reach the daemon again.
      - name: Guard — daemon recovers from a stale socket on restart
        run: |
          set -euo pipefail
          CID=$(docker run -d nix-config-devcontainer:latest)
          trap 'docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT

          alive() { docker exec "$CID" sh -c 'NIX_REMOTE=daemon nix store ping >/dev/null 2>&1'; }
          for _ in $(seq 1 50); do alive && break; sleep 0.2; done
          alive || { echo "✗ daemon never came up on first start"; exit 1; }
          echo "✓ daemon up on first start"

          # Kill the daemon (no procps in the image — scan /proc), leaving the socket.
          docker exec -u 0 "$CID" bash -c '
            for c in /proc/[0-9]*/comm; do
              read -r name < "$c" 2>/dev/null || continue
              [ "$name" = nix-daemon ] && kill "$(basename "$(dirname "$c")")" 2>/dev/null || true
            done'
          for _ in $(seq 1 25); do alive || break; sleep 0.2; done
          alive && { echo "✗ daemon still answering after kill — test setup failed"; exit 1; }
          docker exec "$CID" test -S /nix/var/nix/daemon-socket/socket \
            || { echo "✗ socket inode gone — not the stale-socket scenario"; exit 1; }
          echo "✓ reproduced stale socket (dead daemon, socket inode present)"

          docker restart "$CID" >/dev/null
          for _ in $(seq 1 50); do alive && break; sleep 0.2; done
          alive || { echo "✗ daemon did NOT self-heal from the stale socket on restart"; exit 1; }
          echo "=== daemon stale-socket self-heal guard passed ==="

      # The whole `build` job runs only when `is_publish` is true (merge to main or
      # manual dispatch) — PRs are eval-only via the `gate` job, so the build + smoke
      # test ABOVE no longer run on PRs. On a publish-capable run the build + smoke are
      # the cheap safety net (Cachix substitutes the warm closure), proving the image
      # builds and `nix develop` resolves even for a no-op main push. Publish itself
      # (login + push) is further gated on gate.outputs.changed, so the expensive part
      # — the multi-GB skopeo upload — is skipped when the image CONTENT is unchanged.
      - name: Login to GHCR
        if: needs.gate.outputs.is_publish == 'true' && needs.gate.outputs.changed == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Daemonless push (nixpkgs-manual idiom), then RETAG in-registry to :latest
      # and :<sha12> — no manifest-list/imagetools assembly needed since this
      # fleet publishes a single arm64 image, not a multi-arch index.
      #
      # Three deliberate choices here:
      #  1. Materialise the archive to a file, then `copy docker-archive:image.tar`
      #     — NOT `./result | … docker-archive:/dev/stdin`. `streamLayeredImage`
      #     emits an UNCOMPRESSED docker-archive tar; piping through a compressor
      #     both corrupts that transport (skopeo expects a plain tar on
      #     `docker-archive:`) and, under bash `pipefail`, turns skopeo's own
      #     early exit into a spurious step failure. A file removes the pipe
      #     entirely — no SIGPIPE race, no pipefail fragility.
      #  2. Point skopeo at our OWN registries.conf via CONTAINERS_REGISTRIES_CONF.
      #     nixpkgs skopeo (containers/image ≥ v2 only) otherwise reads the GitHub
      #     runner's host /etc/containers/registries.conf, which is still v1, and
      #     aborts with "registries.conf must be in v2 format but is in v1" before
      #     it ever reads the archive. An empty v2 file (registry defaults only)
      #     sidesteps the incompatible host config.
      #  3. `--format oci` converts the manifest from the v2s2 Docker Schema 2 that
      #     streamLayeredImage emits to OCI (application/vnd.oci.image.manifest.v1+json),
      #     matching this repo's documented OCI-annotation convention even for a
      #     single-arch publish.
      - name: Push and tag image
        if: needs.gate.outputs.is_publish == 'true' && needs.gate.outputs.changed == 'true'
        env:
          CONTAINERS_REGISTRIES_CONF: ${{ runner.temp }}/registries.conf
        run: |
          set -euo pipefail
          printf 'unqualified-search-registries = ["docker.io"]\n' \
            > "${CONTAINERS_REGISTRIES_CONF}"
          REF="${{ needs.gate.outputs.ref }}"
          SHA="${{ needs.gate.outputs.sha12 }}"
          ./result > image.tar
          for TAG in "$SHA" latest; do
            nix run nixpkgs#skopeo -- --insecure-policy copy --format oci \
              docker-archive:image.tar \
              "docker://${REF}:${TAG}"
          done

      # HARD POST-PUBLISH GUARD — fail the publish if `:latest` is not actually
      # pullable. A single real `docker pull` proves the tag resolves; there is
      # no manifest-list index to go dangling in a single-arch publish, so this
      # is a simpler check than a multi-arch fleet needs.
      - name: Verify :latest is durably pullable
        if: needs.gate.outputs.is_publish == 'true' && needs.gate.outputs.changed == 'true'
        run: |
          set -euo pipefail
          REF="${{ needs.gate.outputs.ref }}"
          echo "::group::real docker pull ${REF}:latest"
          docker pull "${REF}:latest"
          echo "::endgroup::"
          echo "✓ :latest is durably pullable"

      # Record the baseline ONLY after a fully successful publish, so a failed push
      # never poisons the cache into skipping the next (needed) republish. On the
      # next run the gate restores this exact key: a HIT means the drvPath is
      # unchanged ⇒ skip.
      - name: Create gate marker
        if: needs.gate.outputs.is_publish == 'true' && needs.gate.outputs.changed == 'true'
        run: echo "${{ needs.gate.outputs.cache_key }} @ ${{ github.sha }}" > .gate-marker

      - name: Record published baseline (gate cache)
        if: needs.gate.outputs.is_publish == 'true' && needs.gate.outputs.changed == 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .gate-marker
          key: ${{ needs.gate.outputs.cache_key }}
