name: build-devcontainer

# Nix-built, multi-arch devcontainer image for nix-config.
# The image is produced by `pkgs.dockerTools.streamLayeredImage`, exposed as
# packages.<linux>.devcontainerImage in flake.nix, and published to GHCR.
# .devcontainer/devcontainer.json just pulls the `image:` this builds ‚Äî the
# heavyweight toolchain (a working nix + the warm devShell closure + node +
# claude-code + gh) is baked in, so create-time setup is near-zero.
#
# PRs build-only; push to main publishes :latest + :<sha12>. Every leg also
# smoke-tests the freshly-built image (nix develop from the warm store).
#
# This REPLACES the old features-based test-devcontainer.yml (deleted in the
# same change): that workflow built the now-removed Features stack via
# devcontainers/ci and asserted an nvm claude path that no longer exists.

on:
  pull_request:
    paths:
      - "flake.nix"
      - "flake.lock"
      - "packages/**"
      - ".devcontainer/**"
      - ".github/workflows/build-devcontainer.yml"
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "packages/**"
      - ".devcontainer/**"
      - ".github/workflows/build-devcontainer.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push the image to GHCR via GITHUB_TOKEN ‚Äî no extra secret

env:
  IMAGE_NAME: devcontainer

concurrency:
  group: build-devcontainer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # GATE: evaluate the OPTIONAL Cachix token ONCE (secrets.* is not reliable in
  # every `if:` context). The build fully succeeds with or without it ‚Äî no token
  # means build against cache.nixos.org + the public ismailkattakath cache only.
  config:
    runs-on: ubuntu-24.04
    outputs:
      has_cachix: ${{ steps.probe.outputs.has_cachix }}
      # Publish on a main push OR a manual dispatch (from any ref). A manual
      # workflow_dispatch is the intended force-republish path: it pairs with the
      # gate's workflow_dispatch‚Üíchanged=true bypass so a maintainer can always
      # republish (e.g. after a metadata-only change like an annotation reword that
      # leaves the image drvPath ‚Äî and thus the gate ‚Äî unchanged). Without dispatch
      # here, is_publish stayed false on dispatch and the publish+manifest were
      # skipped despite changed=true, so a forced republish never actually happened.
      is_publish: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    steps:
      - id: probe
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          if [ -n "${CACHIX_AUTH_TOKEN}" ]; then
            echo "has_cachix=true"  >> "$GITHUB_OUTPUT"
          else
            echo "has_cachix=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CACHIX_AUTH_TOKEN absent ‚Äî read-only cache, no push."
          fi

  # GATE: publish only when the image's CONTENT actually changed.
  #
  # The trigger is a path filter on flake.nix/flake.lock/packages/**, but flake.nix
  # is monolithic ‚Äî a darwin host rename (m3pro‚Üísilicon‚Üínixcon) edits flake.nix and
  # fires a full multi-arch build+publish even though the image bytes are IDENTICAL
  # (empirically: consecutive publishes produced the same digest sha256:cd12d75b‚Ä¶).
  # A path filter cannot tell an image-affecting flake.nix edit from an unrelated
  # one; only the derivation itself can. So we ask Nix what the image evaluates to
  # (its per-arch drvPath ‚Äî pure eval, NO build, NO realisation) and compare against
  # what was last successfully published.
  #
  # Evaluating another system's drvPath does NOT build it and works fine on an
  # x86_64 runner, so both arches are computed here on one cheap ubuntu-24.04.
  # drvPath is input-addressed: it flips iff a transitive input changes
  # (devPackagesFor, extraTools, or a flake.lock bump that moves the closure) and
  # stays put for unrelated flake.nix edits ‚Äî exactly the discriminator paths lack.
  # A flake.lock bump therefore flips it automatically, so the gate fully covers it.
  #
  # Mechanism: actions/cache keyed on sha256(amd64.drvPath + arm64.drvPath).
  #   cache HIT  ‚áí this exact image was already published ‚áí changed=false ‚áí SKIP.
  #   cache MISS ‚áí new/changed content (or first-ever run)  ‚áí changed=true  ‚áí PUBLISH.
  # The key is SAVED only after a SUCCESSFUL publish (in the manifest job), so a
  # failed push never poisons the baseline. First run (no cache), workflow_dispatch,
  # and any non-main ref all force changed=true ‚Äî we never skip without a recorded
  # baseline, and a manual dispatch can always force a republish.
  #
  # Bias is conservative: drvPath can occasionally flip without the output bytes
  # changing (a harmless re-publish), but it can NEVER stay the same when the output
  # changes. So the gate may over-publish, never under-publish ‚Äî the correct bias.
  gate:
    needs: config
    runs-on: ubuntu-24.04 # eval only ‚Äî cheapest runner; no arm needed for arm64 drvPath
    outputs:
      changed: ${{ steps.decide.outputs.changed }}
      cache_key: ${{ steps.key.outputs.cache_key }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # Flakes ignore untracked files; stage before any eval (git-purity).
      - name: Stage tree (git purity)
        run: git add -A

      - name: Evaluate per-arch image drvPaths (pure eval, no build)
        id: key
        run: |
          # drvPath is per-arch by construction (system is part of the input hash),
          # so there is no single arch-independent value ‚Äî evaluate BOTH. Neither
          # eval realises the closure; --raw prints the .drv store path only.
          AMD64="$(nix eval --raw .#packages.x86_64-linux.devcontainerImage.drvPath)"
          ARM64="$(nix eval --raw .#packages.aarch64-linux.devcontainerImage.drvPath)"
          echo "amd64 drv: ${AMD64}"
          echo "arm64 drv: ${ARM64}"
          COMBINED="$(printf '%s\n%s\n' "${AMD64}" "${ARM64}" | sha256sum | cut -d' ' -f1)"
          echo "cache_key=devcontainer-drv-v1-${COMBINED}" >> "$GITHUB_OUTPUT"

      # Restore-only probe: a HIT means this exact drvPair was already published.
      - name: Probe published baseline
        id: probe
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .gate-marker
          key: ${{ steps.key.outputs.cache_key }}
          lookup-only: true

      - name: Decide changed
        id: decide
        env:
          HIT: ${{ steps.probe.outputs.cache-hit }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          # Force a republish on manual dispatch or whenever there's no recorded
          # baseline (cache MISS / first-ever run). Skip only on a genuine HIT.
          if [ "${FORCE}" = "true" ] || [ "${HIT}" != "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::devcontainer image content CHANGED (or forced/first-run) ‚Äî will publish."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::devcontainer image drvPath unchanged ‚Äî SKIPPING publish + manifest (no-op republish avoided)."
          fi

  build:
    needs: [config, gate]
    # NATIVE runners per arch ‚Äî no QEMU. Streaming a full-devShell nix closure
    # under emulation would be brutally slow, and aarch64 is what the Apple
    # Silicon devcontainer actually runs.
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            system: x86_64-linux
            arch: amd64
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        if: needs.config.outputs.has_cachix == 'true'
        with:
          name: ismailkattakath
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Flakes ignore untracked files; stage everything before any eval/build.
      - name: Stage tree (git purity)
        run: git add -A

      - name: Compute image ref
        id: ref
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=ghcr.io/${OWNER}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha12=$(echo '${{ github.sha }}' | cut -c1-12)" >> "$GITHUB_OUTPUT"

      # streamLayeredImage evaluates to a STREAM SCRIPT (not a tarball). unfree
      # (claude-code) is permitted via flake.nix's pkgsUnfreeFor.
      - name: Build devcontainer image (stream script)
        run: |
          nix build -L ".#packages.${{ matrix.system }}.devcontainerImage"
          test -x ./result

      # Smoke test the FRESHLY-BUILT image locally ‚Äî every PR + push, no GHCR
      # needed. Proves the MULTI-USER model end to end exactly as the devcontainer
      # runs it: start the container as root (its entrypoint launches nix-daemon;
      # the sleep-infinity Cmd keeps it alive), then run the checks as the NON-ROOT
      # vscode user via `docker exec` ‚Äî nix reaches the root daemon over the socket
      # (NIX_REMOTE=daemon) and `nix develop` resolves from the warm baked store.
      - name: Smoke test (multi-user nix works in the baked image)
        run: |
          ./result | docker load
          CID=$(docker run -d \
            -v "$PWD:/workspaces/nix-config" \
            -w /workspaces/nix-config \
            nix-config-devcontainer:latest)
          dump() {
            echo "--- nix-daemon.log ---"
            docker exec "$CID" cat /tmp/nix-daemon.log 2>/dev/null || true
            echo "--- container logs ---"
            docker logs "$CID" 2>&1 | tail -20 || true
            docker rm -f "$CID" >/dev/null 2>&1 || true
          }
          trap dump EXIT
          # Wait for the daemon socket the root entrypoint creates.
          for _ in $(seq 1 50); do
            docker exec "$CID" test -S /nix/var/nix/daemon-socket/socket && break
            sleep 0.2
          done
          docker exec -u 1000:1000 "$CID" bash -lc '
            set -e
            echo "user: $(id -un) ($(id -u):$(id -g)); NIX_REMOTE=$NIX_REMOTE"
            git config --global --add safe.directory /workspaces/nix-config
            nix --version
            nix store ping                       # proves the client reaches the root daemon
            nix config show | grep -qi ismailkattakath.cachix.org \
              || { echo "‚úó cachix substituter missing from baked nix.conf"; exit 1; }
            command -v node  >/dev/null && node --version
            command -v gh    >/dev/null && gh --version | head -1
            command -v claude >/dev/null && echo "‚úì claude on PATH" || { echo "‚úó claude missing"; exit 1; }
            echo "=== devShell warm (should resolve from baked store via daemon, not build) ==="
            OUT=$(nix develop .#default --command true 2>&1) || { echo "$OUT"; exit 1; }
            echo "$OUT"
            # The devShell runs as the non-root vscode user against a bind-mounted
            # workspace owned by a different uid, so the git-hooks.nix pre-commit
            # installer cannot write .git/.pre-commit-config.yaml. flake.nix now
            # guards that install behind [ -w .git ] and prints a skip notice
            # instead. Assert the shellHook produced NO permission/hook errors ‚Äî
            # a regression (unguarded installer) would spam these again.
            # NOTE: this whole block is inside a single-quoted bash -lc string ‚Äî
            # keep it free of apostrophes/single quotes or they terminate it early.
            if echo "$OUT" | grep -Eiq "permission denied|could not lock config file|creating symlink .*\.pre-commit-config"; then
              echo "‚úó shellHook emitted a pre-commit/permission error ‚Äî the [ -w .git ] guard regressed:"; echo "$OUT"; exit 1
            fi
            echo "‚úì shellHook clean (pre-commit install guarded on non-writable .git)"
            if echo "$OUT" | grep -Eq "^building .|building of "; then
              echo "‚öÝ devShell built from source ‚Äî warm-store miss:"; echo "$OUT"
            else
              echo "‚úì devShell resolved without a from-source build"
            fi
            echo "=== real from-scratch build through the daemon (exercises the build path) ==="
            # The warm-store checks above only READ the store; a store query never
            # acquires a build user. This proves the daemon can actually REALIZE a
            # derivation (build-users-group empty ‚Üí builds as the root daemon uid).
            # nixpkgs#hello is tiny; substituted from cache.nixos.org if available,
            # built locally otherwise ‚Äî either way it flows through the daemon.
            nix build --no-link --print-build-logs nixpkgs#hello \
              || { echo "‚úó from-scratch build through the daemon FAILED"; exit 1; }
            echo "‚úì daemon realized nixpkgs#hello"
            echo "=== smoke test passed ==="
          '

      # Publish (login + push) runs only on a main push whose image CONTENT changed.
      # The build + smoke test ABOVE stay unconditional ‚Äî they are the cheap safety
      # net (Cachix substitutes the warm closure), so PRs and even no-op main pushes
      # still prove the image builds and `nix develop` resolves. Only the expensive
      # part ‚Äî the multi-GB skopeo uploads (and, downstream, the manifest job + the
      # scarce arm64 runner's push) ‚Äî is gated on gate.outputs.changed.
      - name: Login to GHCR
        if: needs.config.outputs.is_publish == 'true' && needs.gate.outputs.changed == 'true'
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Daemonless push (nixpkgs-manual idiom). skopeo reads the docker config
      # that docker/login-action wrote.
      #
      # Two deliberate choices here:
      #  1. Materialise the archive to a file, then `copy docker-archive:image.tar`
      #     ‚Äî NOT `./result | ‚Ä¶ docker-archive:/dev/stdin`. `streamLayeredImage`
      #     emits an UNCOMPRESSED docker-archive tar; the old `| gzip --fast |`
      #     stage both corrupted that transport (skopeo expects a plain tar on
      #     `docker-archive:`) and, under bash `pipefail`, turned skopeo's own
      #     early exit into a spurious `gzip: ‚Ä¶ Broken pipe` step failure. A file
      #     removes the pipe entirely ‚Äî no SIGPIPE race, no pipefail fragility.
      #  2. Point skopeo at our OWN registries.conf via CONTAINERS_REGISTRIES_CONF.
      #     nixpkgs skopeo (containers/image ‚â• v2 only) otherwise reads the GitHub
      #     runner's host /etc/containers/registries.conf, which is still v1, and
      #     aborts with "registries.conf must be in v2 format but is in v1" before
      #     it ever reads the archive. An empty v2 file (registry defaults only)
      #     sidesteps the incompatible host config.
      #  3. `--format oci` converts each per-arch manifest from the v2s2 Docker
      #     Schema 2 that streamLayeredImage emits to OCI
      #     (application/vnd.oci.image.manifest.v1+json). This is LOAD-BEARING for
      #     the manifest job's index annotations: with OCI children, `docker buildx
      #     imagetools create` assembles an OCI image index
      #     (application/vnd.oci.image.index.v1+json), which HAS an `annotations`
      #     field. Without it the children stay v2s2 and imagetools falls back to a
      #     Docker manifest list (vnd.docker.distribution.manifest.list.v2+json)
      #     that has NO annotations field ‚Äî so the index:org.opencontainers.image.*
      #     annotations are SILENTLY DROPPED and GHCR's About panel renders nothing.
      #     `oci` is a documented skopeo-copy --format value (oci|v2s1|v2s2).
      #  4. The `:<sha12>-<arch>` tag this pushes is LOAD-BEARING and must be
      #     RETAINED permanently ‚Äî it is what keeps the per-arch child manifest
      #     alive. `docker buildx imagetools create` (manifest job) copies each
      #     child into the OCI index BY DIGEST but does NOT create any durable
      #     reference of its own to those children; the arch tag is the only
      #     thing holding them. GHCR garbage-collects UNTAGGED manifests, so if
      #     these arch tags ever went away the index children would be pruned and
      #     `:latest` would become a dangling index (200 for the index, 404 for
      #     both children) ‚Äî a `docker pull` then fails for EVERY consumer
      #     (Codespaces prebuilds, local .devcontainer users, CI). That is exactly
      #     the regression this workflow shipped once. DO NOT add a step that
      #     deletes/untags `:<sha12>-<arch>`; keep them as permanent versions. The
      #     manifest job asserts both children still resolve after assembly.
      - name: Push per-arch image
        if: needs.config.outputs.is_publish == 'true' && needs.gate.outputs.changed == 'true'
        env:
          CONTAINERS_REGISTRIES_CONF: ${{ runner.temp }}/registries.conf
        run: |
          printf 'unqualified-search-registries = ["docker.io"]\n' \
            > "${CONTAINERS_REGISTRIES_CONF}"
          ./result > image.tar
          nix run nixpkgs#skopeo -- --insecure-policy copy --format oci \
            docker-archive:image.tar \
            "docker://${{ steps.ref.outputs.ref }}:${{ steps.ref.outputs.sha12 }}-${{ matrix.arch }}"

  manifest:
    needs: [config, gate, build]
    if: needs.config.outputs.is_publish == 'true' && needs.gate.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Login to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v3

      - name: Compute image ref
        id: ref
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=ghcr.io/${OWNER}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha12=$(echo '${{ github.sha }}' | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - name: Assemble multi-arch manifest (:latest + :<sha12>)
        run: |
          REF="${{ steps.ref.outputs.ref }}"
          SHA="${{ steps.ref.outputs.sha12 }}"
          # RFC3339 UTC build timestamp for org.opencontainers.image.created.
          CREATED="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # index:-prefixed annotations attach to the MANIFEST LIST (the OCI image
          # index), not the child per-arch manifests ‚Äî the only place metadata lands
          # on a multi-arch image (OCI-style labels don't apply to an index). GHCR
          # renders the package "About" panel from these index annotations. This is a
          # PUBLIC devcontainer base image, so we set the full standard OCI predefined
          # annotation set (image-spec annotations.md): description/source/licenses
          # plus revision (the exact commit), created (build time), and version (the
          # immutable :sha12 tag). All keyed to the repo/build via expressions so they
          # stay in lockstep. Takes effect on the next push-to-main publish, not a PR.
          docker buildx imagetools create \
            --annotation "index:org.opencontainers.image.description=Multi-arch distroless devcontainer with a working Nix daemon and a warm devShell built from ${{ github.repository }}" \
            --annotation "index:org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --annotation "index:org.opencontainers.image.licenses=MIT" \
            --annotation "index:org.opencontainers.image.revision=${{ github.sha }}" \
            --annotation "index:org.opencontainers.image.created=${CREATED}" \
            --annotation "index:org.opencontainers.image.version=${SHA}" \
            -t "${REF}:latest" \
            -t "${REF}:${SHA}" \
            "${REF}:${SHA}-amd64" \
            "${REF}:${SHA}-arm64"
          docker buildx imagetools inspect "${REF}:latest"

      # HARD POST-PUBLISH GUARD ‚Äî fail the publish if `:latest` is not actually
      # pullable. The old pipeline shipped a DANGLING INDEX: the OCI index served
      # HTTP 200 but both per-arch children 404'd, so every `docker pull` failed
      # (Codespaces prebuilds, local .devcontainer users, CI). `imagetools inspect`
      # above does NOT catch this ‚Äî it reads the index descriptors, not the child
      # bodies. This step does FOUR things a dangling (or soon-to-dangle) index
      # cannot survive:
      #   1. a REAL `docker pull :latest`, which resolves + fetches a platform
      #      child (the amd64 child, on this ubuntu-24.04 runner) ‚Äî 404 ‚áí failure;
      #   2. an explicit resolve of EVERY child digest the index references, so a
      #      broken child on the arch the runner did NOT pull (arm64) is still
      #      caught ‚Äî a registry GET per child, 404 ‚áí failure;
      #   3. re-assert #15's index annotation survived, so a future imagetools
      #      change that silently drops it also fails here.
      #   4. assert the per-arch `:<sha12>-<arch>` child TAGS still resolve ‚Äî these
      #      are the ONLY thing anchoring the index children against GHCR's
      #      untagged-manifest GC, so verifying them turns a future "someone untagged
      #      the children" time-bomb (which #22 originally shipped) into an immediate
      #      publish failure instead of a delayed dangling index.
      # Without this, a dangling index shipped silently and only surfaced in a
      # downstream Codespaces prebuild. Now it fails CI at publish time.
      - name: Verify :latest is durably pullable (children resolve)
        run: |
          set -euo pipefail
          REF="${{ steps.ref.outputs.ref }}"

          echo "::group::real docker pull ${REF}:latest (fetches a platform child)"
          docker pull "${REF}:latest"
          echo "::endgroup::"

          RAW="$(docker buildx imagetools inspect --raw "${REF}:latest")"

          # Resolve EVERY child manifest the index references. jq extracts the
          # image (platform) children; attestation/unknown descriptors have
          # platform.architecture == "unknown" and are skipped. A dangling child
          # makes `imagetools inspect <ref>@<digest>` return non-zero (registry
          # 404) and, under set -e, fails the job. Portable `while read` loop
          # (no `mapfile`) so bash version can't matter.
          DIGESTS="$(printf '%s' "$RAW" \
            | jq -r '.manifests[] | select((.platform.architecture // "") != "unknown") | .digest')"
          COUNT="$(printf '%s\n' "$DIGESTS" | grep -c '^sha256:')"
          if [ "${COUNT}" -lt 2 ]; then
            echo "‚úó expected >=2 platform children in the index, found ${COUNT}"; echo "$RAW"; exit 1
          fi
          printf '%s\n' "$DIGESTS" | while IFS= read -r d; do
            [ -n "$d" ] || continue
            echo "‚Üí resolving child ${d}"
            docker buildx imagetools inspect "${REF}@${d}" >/dev/null \
              || { echo "‚úó child ${d} does NOT resolve ‚Äî :latest is a DANGLING INDEX"; exit 1; }
          done
          echo "‚úì all ${COUNT} child manifests resolve"

          # Protect the index annotation set: assert the load-bearing ones survived
          # assembly (#15 for description; revision guards the enriched OCI set). A
          # future imagetools change that silently drops annotations fails here.
          for KEY in description revision; do
            printf '%s' "$RAW" \
              | jq -e --arg k "org.opencontainers.image.${KEY}" '.annotations[$k]' >/dev/null \
              || { echo "‚úó index lost org.opencontainers.image.${KEY} annotation"; echo "$RAW"; exit 1; }
          done
          echo "‚úì index annotations intact (description + revision present)"

          # RETENTION ASSERTION (hardening) ‚Äî the index children stay alive ONLY
          # because the per-arch `:<sha12>-<arch>` TAGS keep them referenced (see the
          # build job's "Push per-arch image" note). Assert those tags actually
          # resolve, so if anything ever untags/deletes them the publish FAILS here
          # instead of silently leaving a time-bomb that GHCR GC turns into a dangling
          # index later. This is the load-bearing invariant of this publish design;
          # test it every publish rather than trust it.
          SHA="${{ steps.ref.outputs.sha12 }}"
          for ARCH in amd64 arm64; do
            echo "‚Üí resolving retained child tag ${REF}:${SHA}-${ARCH}"
            docker buildx imagetools inspect "${REF}:${SHA}-${ARCH}" >/dev/null \
              || { echo "‚úó child tag ${SHA}-${ARCH} does NOT resolve ‚Äî the retention anchor for the index child is GONE; :latest will dangle after GC"; exit 1; }
          done
          echo "‚úì both per-arch child tags retained (index children durably anchored)"
          echo "=== :latest is durably pullable ==="

      # Record the baseline ONLY after a fully successful publish, so a failed push
      # never poisons the cache into skipping the next (needed) republish. On the
      # next run the gate restores this exact key: a HIT means the drvPair is
      # unchanged ‚áí skip. The marker file content is irrelevant ‚Äî presence of the
      # KEY is the signal. A no-op main push (e.g. a host-rename-style flake.nix
      # edit that leaves the image bytes identical) will now find this key on the
      # next run and skip the publish + this whole manifest job.
      - name: Create gate marker
        run: echo "${{ needs.gate.outputs.cache_key }} @ ${{ github.sha }}" > .gate-marker

      - name: Record published baseline (gate cache)
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .gate-marker
          key: ${{ needs.gate.outputs.cache_key }}
