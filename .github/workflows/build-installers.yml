name: build-installers

# Build and publish installer images only when their CONTENT actually changes.
# These images are stable and rarely need rebuilding, and the re-publish is
# genuinely expensive (see the `gate` job): the ~1h cold RPi kernel build PLUS a
# non-idempotent multi-GB GitHub-Release re-upload. A path filter narrows the
# firing; the drvPath gate then suppresses the no-op runs a monolithic flake.nix
# would otherwise trigger.
#
# Both legs build aarch64-linux images on GitHub-hosted `ubuntu-24.04-arm`
# (native aarch64) — deliberately NOT the self-hosted `nixvm` runner; see the
# build job for the CIRCULARITY (the VM must not be the only thing that can
# rebuild the VM) and STARVATION (the ~1h Pi kernel blocked every PR) reasons it
# was moved off nixvm:
#   nixvm-installer: aarch64-linux ISO
#   nixpi-installer: aarch64-linux SD card image (cold RPi kernel — heavy build)
# Being GitHub-hosted, this workflow installs Nix and configures the kattakath
# substituter itself (install-nix-action + cachix-action below) — unlike the
# self-hosted runners, which already ship both.
#
# Published to the rolling installer-latest GitHub pre-release so the images
# are always downloadable at a stable URL without tag-per-commit churn.

on:
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "hosts/nixvm-installer.nix"
      - "hosts/nixpi-installer.nix"
      - ".github/workflows/build-installers.yml"
      - ".github/workflows/build-installers-impl.yml"
  workflow_dispatch:

concurrency:
  group: build-installers-${{ github.ref }}
  # false: this workflow publishes a matched pair of images to the same rolling
  # release. Cancelling one matrix leg mid-upload on a rapid double-push could
  # leave installer-latest with one image updated and the other stale.
  cancel-in-progress: false

# READ-ONLY by default. `contents: write` (the Release upload) is scoped to ONLY
# the `build` job below, so the eval-only `gate` and the cache-only
# `record-baseline` jobs never receive a write-capable GitHub token.
permissions:
  contents: read

jobs:
  # GATE: build + re-upload the installer images only when their CONTENT changed.
  #
  # The trigger is a path filter on flake.nix/flake.lock/hosts/nixvm-installer.nix/
  # hosts/nixpi-installer.nix, but flake.nix is monolithic — an unrelated edit can
  # fire a full ~1h build AND a full multi-GB GitHub-Release re-upload even though
  # the image bytes are IDENTICAL. Unlike a deduping registry (GHCR/Cachix skip a
  # blob they already hold), softprops/action-gh-release re-uploads the ENTIRE
  # ISO/img asset every run, so a no-op re-publish is genuinely costly here. A path
  # filter cannot tell an image-affecting flake.nix edit from an unrelated one;
  # only the derivation can. So we ask Nix what each installer evaluates to (its
  # drvPath — pure eval, NO build, NO realisation) and compare against what was
  # last successfully published.
  #
  # Keyed on BOTH installer drvPaths combined, so a change to EITHER installer
  # republishes BOTH images (the nixvm ISO re-uploads even if only nixpi changed).
  # softprops has no per-asset dedup, so this conservative over-publish is the
  # correct mirror of build-devcontainer's "either arch republishes the whole list".
  #
  # Mechanism: actions/cache keyed on sha256(drv_iso + drv_img).
  #   cache HIT  ⇒ this exact pair was already published ⇒ changed=false ⇒ SKIP.
  #   cache MISS ⇒ new/changed content (or first-ever run)  ⇒ changed=true  ⇒ BUILD+PUBLISH.
  # The key is SAVED (by the `record-baseline` job) only after BOTH legs upload
  # successfully, so a failed leg never poisons the baseline into skipping the next
  # (needed) republish. First run, workflow_dispatch, and any non-main ref all
  # force changed=true.
  #
  # DEVIATION from build-devcontainer (which still builds+smoke-tests an unchanged
  # image and gates only the push): we gate the WHOLE build job. There are no
  # smoke/regression guards worth running on an unchanged installer and the cold
  # RPi kernel is ~1h, so an unchanged installer must skip the BUILD as well as the
  # upload — hence `changed` guards the build job's `if:`, not individual steps.
  #
  # Bias is conservative on FORWARD change: drvPath can flip without the output
  # bytes changing (a harmless re-publish), but it can never stay the same when the
  # output changes — so a genuine change is always republished.
  #
  # KNOWN LIMITATION — revert within the ~7-day cache window. installer-latest is a
  # single MUTABLE slot holding only the LAST-published pair, while the gate marker
  # records every drvPath EVER published. Publish K1, then K2, then REVERT to K1
  # while K1's marker is still cached: the gate sees a HIT and SKIPS, so the release
  # keeps serving K2's images. So the "never under-publish" guarantee holds for
  # forward changes but NOT for a revert to a recently-published state. Recover
  # immediately with a manual `workflow_dispatch` (forces changed=true) — a mutable
  # rolling release cannot be made revert-safe by an ever-published cache alone, and
  # reverting an installer within a week is rare enough that one click is the right
  # cost. (record-baseline's post-publish asset check, below, still guarantees we
  # never record a baseline for a publish that did not actually land.)
  gate:
    runs-on: ubuntu-24.04-arm # native aarch64 — eval is arch-agnostic; cheapest correct runner
    timeout-minutes: 15
    outputs:
      changed: ${{ steps.decide.outputs.changed }}
      cache_key: ${{ steps.key.outputs.cache_key }}
      # Always 'true' for THIS workflow's triggers (push-to-main + workflow_dispatch,
      # no PR), but kept as a faithful mirror of build-devcontainer's gate so the
      # build/record-baseline `if:` stay identical — and safe if a PR trigger is
      # ever added.
      is_publish: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Pure drvPath eval needs Nix + flakes but NO substituter/cachix. Reuse the
      # install-nix-action pin already in this file (NOT the ./.github/actions/
      # nix-setup composite, which pins a DIFFERENT install-nix SHA — keep this
      # workflow self-consistent).
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Flakes evaluate the git tree, not the working dir — stage everything BEFORE
      # `nix eval`, or the gate could hash a different tree than the build job builds.
      - name: Stage tree (git purity)
        run: git add -A

      - name: Evaluate BOTH installer drvPaths (pure eval, no build)
        id: key
        run: |
          set -euo pipefail
          DRV_ISO="$(nix eval --raw .#packages.aarch64-linux.nixvm-installer-iso.drvPath)"
          DRV_IMG="$(nix eval --raw .#packages.aarch64-linux.nixpi-installer-image.drvPath)"
          echo "drv nixvm-iso: ${DRV_ISO}"
          echo "drv nixpi-img: ${DRV_IMG}"
          COMBINED="$(printf '%s\n%s\n' "${DRV_ISO}" "${DRV_IMG}" | sha256sum | cut -d' ' -f1)"
          # v1: initial two-installer key. Bump (v2, …) if a gated installer drvPath
          # is ever added/removed/renamed, so a stale HIT under old semantics can't
          # skip the first run under new semantics.
          echo "cache_key=installers-drv-v1-${COMBINED}" >> "$GITHUB_OUTPUT"

      - name: Probe published baseline
        id: probe
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .gate-marker
          key: ${{ steps.key.outputs.cache_key }}
          lookup-only: true

      - name: Decide changed
        id: decide
        env:
          HIT: ${{ steps.probe.outputs.cache-hit }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ "${FORCE}" = "true" ] || [ "${HIT}" != "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::installer images CHANGED (or forced/first-run) — will build+publish."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::installer drvPaths unchanged — SKIPPING build+publish (no-op re-upload avoided)."
          fi

  # BUILD: delegated to the reusable build-installers-impl.yml so the whole matrix
  # (one leg per installer) is gated by ONE `if:` on ONE job. A matrix job skipped
  # by a job-level `if:` renders its `${{ matrix.name }}` name UNEXPANDED; routing
  # through a reusable workflow instead means the skip shows a single clean
  # `installers` job, and a run shows `installers / build (nixvm-live-iso)` /
  # `installers / build (nixpi-sd-img)`. `contents: write` (the installer-latest
  # Release upload) is granted here and caps the called workflow's token; the
  # eval-only `gate` and cache-only `record-baseline` jobs never receive it.
  installers:
    needs: [gate]
    permissions:
      contents: write
    # Skip BOTH the ~1h build and the non-idempotent multi-GB upload when the
    # installers are unchanged. is_publish is always true for this workflow's
    # triggers; the load-bearing guard is changed (see the gate comment).
    if: needs.gate.outputs.is_publish == 'true' && needs.gate.outputs.changed == 'true'
    uses: ./.github/workflows/build-installers-impl.yml
    secrets: inherit

  # RECORD-BASELINE: save the gate marker ONLY after a fully successful publish, so
  # the next run's gate probe can SKIP an unchanged pair. `needs: [installers]`
  # waits for the reusable build workflow's EVERY leg to succeed, so a failed leg →
  # this job skips → the baseline is never poisoned into skipping a still-needed
  # republish. One combined key over both installers (matching the gate), one save
  # job — do not split into per-leg saves, or the shared-key model breaks.
  record-baseline:
    needs: [gate, installers]
    if: needs.gate.outputs.is_publish == 'true' && needs.gate.outputs.changed == 'true'
    runs-on: ubuntu-24.04-arm
    # Read-only: this job reads the release to verify assets, then writes only a
    # Cachix-side cache marker (no GitHub state).
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      # HARD POST-PUBLISH GUARD (the mirror of build-devcontainer's "verify :latest
      # is pullable" step). softprops exiting 0 does NOT prove the asset landed — a
      # partial/empty upload would otherwise let us record a baseline and thereby
      # SUPPRESS the next, still-needed republish. Confirm a real .iso AND a real
      # .img* are actually attached to installer-latest before trusting the publish
      # enough to bake its drvPath into the gate baseline.
      - name: Verify installer-latest actually has both assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          names="$(gh release view installer-latest -R "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
          echo "installer-latest assets:"; printf '%s\n' "$names" | sed 's/^/  /'
          printf '%s\n' "$names" | grep -Eq '\.iso$' \
            || { echo "::error::no .iso asset on installer-latest — refusing to record the gate baseline"; exit 1; }
          printf '%s\n' "$names" | grep -Eq '\.img' \
            || { echo "::error::no .img asset on installer-latest — refusing to record the gate baseline"; exit 1; }
          echo "✓ both installer assets present on installer-latest"

      - name: Create gate marker
        run: echo "${{ needs.gate.outputs.cache_key }} @ ${{ github.sha }}" > .gate-marker

      - name: Record published baseline (gate cache)
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .gate-marker
          key: ${{ needs.gate.outputs.cache_key }}
