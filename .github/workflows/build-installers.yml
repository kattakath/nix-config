name: build-installers

# Build and publish installer images only when installer-related files change.
# These images are stable and rarely need rebuilding — path-filtering avoids
# wasting CI minutes on unrelated pushes.
#
# Both legs build aarch64-linux images on the SELF-HOSTED `nixvm` runner
# (github-nix-ci, labels nixvm+aarch64-linux):
#   nixvm-installer: aarch64-linux ISO
#   nixpi-installer: aarch64-linux SD card image (cold RPi kernel — heavy build)
# Requires nixvm to be running. install-nix/cachix-action are skipped there
# (NixOS already ships Nix + the kattakath substituter).
#
# Published to the rolling installer-latest GitHub pre-release so the images
# are always downloadable at a stable URL without tag-per-commit churn.

on:
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "hosts/nixvm-installer.nix"
      - "hosts/nixpi-installer.nix"
      - ".github/workflows/build-installers.yml"
  workflow_dispatch:

concurrency:
  group: build-installers-${{ github.ref }}
  # false: this workflow publishes a matched pair of images to the same rolling
  # release. Cancelling one matrix leg mid-upload on a rapid double-push could
  # leave installer-latest with one image updated and the other stale.
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.name }})
    # GitHub-hosted aarch64, deliberately NOT the self-hosted nixvm runner:
    #
    #   1. CIRCULARITY. This workflow builds the nixvm INSTALLER ISO. Running it
    #      on nixvm means the only machine that can rebuild the VM is the VM —
    #      worthless precisely when the VM is gone (which is how a Mac reset left
    #      the fleet with no way back).
    #   2. STARVATION. The cold Raspberry Pi kernel here takes ~1h. On the shared
    #      runner it blocked every PR in the repo three times in one afternoon.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: nixvm-installer
            package: ".#packages.aarch64-linux.nixvm-installer-iso"
            asset-glob: "result/iso/*.iso"
          - name: nixpi-installer
            package: ".#packages.aarch64-linux.nixpi-installer-image"
            asset-glob: "result/sd-image/*.img*"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-substituters = https://kattakath.cachix.org https://ismailkattakath.cachix.org
            extra-trusted-public-keys = kattakath.cachix.org-1:y/w6wnb4ZArdlbfWJ82c81uCXeYgG/sGDUYCszavmEw= ismailkattakath.cachix.org-1:7BbEvLpASY7aNUZfpzRMWir1zjU3nqmllBTl8p7gr2I=

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: kattakath
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          # Push the BUILD closure (the ~1h RPi kernel and friends) but NOT the
          # finished images: a compressed .iso/.img has no store references, so
          # pushing it cached one multi-GB blob and none of the expensive
          # intermediates. The images ship via the installer-latest release,
          # which is where something you `dd` belongs.
          pushFilter: "(-nixos-sd-image-|-nixos-minimal-.*\\.iso|\\.img)"
          skipPush: false

      - name: Stage tree (git purity)
        run: git add -A

      - name: Build ${{ matrix.name }}
        # -L / --print-build-logs surfaces builder stderr directly in the CI log,
        # so a failing derivation (e.g. the RPi kernel modules-shrunk) is
        # diagnosable without a separate `nix log` on the ephemeral runner.
        run: nix build ${{ matrix.package }} --out-link result --print-build-logs

      - name: Publish to installer-latest release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: installer-latest
          name: "Installer Images (latest)"
          body: |
            Rolling installer images built from `${{ github.sha }}`.

            | Image | Architecture | Use |
            |---|---|---|
            | `nixvm-installer.iso` | aarch64-linux | Boot in UTM/QEMU, `ssh nixos@nixvm-installer.local`, run `nix run github:kattakath/nix-config#nixvm` |
            | `nixpi-installer.img*` | aarch64-linux (RPi 4) | Flash to SD card, `ssh nixos@nixpi-installer.local`, run `sudo nixos-rebuild switch --flake github:kattakath/nix-config#nixpi` |
          prerelease: true
          make_latest: false
          files: ${{ matrix.asset-glob }}
