name: build-installers

# Build and publish installer images only when installer-related files change.
# These images are stable and rarely need rebuilding — path-filtering avoids
# wasting CI minutes on unrelated pushes.
#
# nixvm-installer: aarch64-linux ISO (ubuntu-24.04-arm native runner)
# nixpi-installer: aarch64-linux SD card image (ubuntu-24.04-arm native runner)
#
# Published to the rolling installer-latest GitHub pre-release so the images
# are always downloadable at a stable URL without tag-per-commit churn.

on:
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "hosts/nixvm-installer.nix"
      - "hosts/nixpi-installer.nix"
      - ".github/workflows/build-installers.yml"
  workflow_dispatch:

concurrency:
  group: build-installers-${{ github.ref }}
  # false: this workflow publishes a matched pair of images to the same rolling
  # release. Cancelling one matrix leg mid-upload on a rapid double-push could
  # leave installer-latest with one image updated and the other stale.
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: nixvm-installer
            runs-on: ubuntu-24.04-arm
            package: ".#packages.aarch64-linux.nixvm-installer-iso"
            asset-glob: "result/iso/*.iso"
          - name: nixpi-installer
            runs-on: ubuntu-24.04-arm
            package: ".#packages.aarch64-linux.nixpi-installer-image"
            asset-glob: "result/sd-image/*.img*"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-substituters = https://ismailkattakath.cachix.org
            extra-trusted-public-keys = ismailkattakath.cachix.org-1:7BbEvLpASY7aNUZfpzRMWir1zjU3nqmllBTl8p7gr2I=

      # skipPush: the two matrix jobs share overlapping closure paths (firmware/
      # regdb packages); cachix-action's implicit post-job auto-push races between
      # them and intermittently 403s. Push explicitly below, wrapped in a retry —
      # Cachix store paths are content-addressed, so a retried push is safe.
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ismailkattakath
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Stage tree (git purity)
        run: git add -A

      - name: Build ${{ matrix.name }}
        # -L / --print-build-logs surfaces builder stderr directly in the CI log,
        # so a failing derivation (e.g. the RPi kernel modules-shrunk) is
        # diagnosable without a separate `nix log` on the ephemeral runner.
        run: nix build ${{ matrix.package }} --out-link result --print-build-logs

      - name: Push to Cachix
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        env:
          # cachix-action ran with skipPush:true (to dodge the concurrent-push
          # race between the two matrix legs), which means it left NO push auth
          # for this separate `cachix push` invocation — it would 403 "not
          # authorized". cachix reads the token from CACHIX_AUTH_TOKEN, so supply
          # it explicitly here.
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 15
          command: cachix push ismailkattakath result

      - name: Publish to installer-latest release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: installer-latest
          name: "Installer Images (latest)"
          body: |
            Rolling installer images built from `${{ github.sha }}`.

            | Image | Architecture | Use |
            |---|---|---|
            | `nixvm-installer.iso` | aarch64-linux | Boot in UTM/QEMU, `ssh nixos@nixvm-installer.local`, run `nix run github:ismailkattakath/nix-config#nixvm` |
            | `nixpi-installer.img*` | aarch64-linux (RPi 4) | Flash to SD card, `ssh nixos@nixpi-installer.local`, run `sudo nixos-rebuild switch --flake github:ismailkattakath/nix-config#nixpi` |
          prerelease: true
          make_latest: false
          files: ${{ matrix.asset-glob }}
