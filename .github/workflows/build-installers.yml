name: build-installers

# Build and publish the LIVE nixpi SD image only when its CONTENT actually
# changes. The image is stable and rarely needs rebuilding, and the re-publish is
# genuinely expensive (see the `gate` job): the ~1h cold RPi kernel build PLUS a
# non-idempotent multi-GB GitHub-Release re-upload. A path filter narrows the
# firing; the drvPath gate then suppresses the no-op runs a monolithic flake.nix
# would otherwise trigger.
#
# TWO legs (a matrix in build-installers-impl.yml) build the two prebuilt aarch64-linux
# artifacts, both secret-free and thus pure functions of the flake, safe to publish:
#   1. the LIVE nixpi sdImage — the flashable artifact itself, not a bootstrap
#      installer (token + Wi-Fi are planted post-flash on the FIRMWARE partition);
#   2. the nixvm-installer ISO — the SSH-reachable Linux nixos-anywhere installs nixvm
#      THROUGH, so `nix run .#nixvm-provision-iso` can DOWNLOAD it instead of building
#      one on the (Linux-builder-less) Mac.
# Both legs run on the SELF-HOSTED `nixvm` runner: policy is that no heavy build ever
# runs on a (paid) GitHub-hosted runner. Building the nixvm ISO on nixvm is a mild
# self-dependency (CIRCULARITY) the old GitHub-hosted leg avoided; we accept it now
# because the ISO's whole value is that a prebuilt copy is ALREADY on the release, so
# recovering a dead nixvm downloads the last-published ISO rather than building one.
# STARVATION is mitigated by nixvm's 2-runner pool — see the build job's comment in
# build-installers-impl.yml for the full rationale.
#
# SPLIT BY WEIGHT: the heavy BUILD runs on self-hosted nixvm (above), but the two
# LIGHTWEIGHT jobs here — `gate` (a pure `nix eval` drvPath, seconds) and
# `record-baseline` (a `gh release view` + cache save) — stay on GitHub-hosted
# `ubuntu-24.04-arm`. They are cheap, must run even to DECIDE whether to occupy a
# nixvm runner slot at all, and keeping them off nixvm avoids consuming one of its
# two runner slots for trivial work. So `gate` installs Nix itself (install-nix-action
# below) purely for the eval;
# the build job needs no such setup (nixvm already ships Nix + the substituter).
#
# Published to the rolling installer-latest GitHub pre-release so the image is
# always downloadable at a stable URL without tag-per-commit churn (this is the
# URL `nixpi-flash --release` downloads from).

on:
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      # The nixpi leg builds the LIVE nixpi sdImage, so its inputs are the whole
      # nixpi closure — trigger on anything it pulls in. This over-fires the cheap
      # gate eval (fine); the drvPath gate below still suppresses no-op builds.
      - "hosts/nixpi.nix"
      - "modules/nixos/**"
      - "modules/shared/**"
      - "packages/landing/**"
      # The nixvm-installer ISO bypasses mkNixos (installation-cd-minimal + this one
      # host file), so this is its only closure input beyond flake.nix/flake.lock.
      - "hosts/nixvm-installer.nix"
      - ".github/workflows/build-installers.yml"
      - ".github/workflows/build-installers-impl.yml"
  workflow_dispatch:

concurrency:
  group: build-installers-${{ github.ref }}
  # false: this workflow publishes the image to a rolling release. Cancelling the
  # build mid-upload on a rapid double-push could leave installer-latest with a
  # partial/empty asset — let an in-flight publish finish rather than truncating it.
  cancel-in-progress: false

# READ-ONLY by default. `contents: write` (the Release upload) is scoped to ONLY
# the `build` job below, so the eval-only `gate` and the cache-only
# `record-baseline` jobs never receive a write-capable GitHub token.
permissions:
  contents: read

jobs:
  # GATE: build + re-upload the nixpi image only when its CONTENT changed.
  #
  # The trigger is a path filter on flake.nix/flake.lock/hosts/nixpi.nix + the
  # modules the live nixpi image pulls in, but flake.nix is monolithic and the
  # module globs are broad — an unrelated edit can fire a full ~1h build AND a full
  # multi-GB GitHub-Release re-upload even though the image bytes are IDENTICAL.
  # Unlike a deduping registry (GHCR/Cachix skip a blob they already hold),
  # softprops/action-gh-release re-uploads the ENTIRE .img asset every run, so a
  # no-op re-publish is genuinely costly here. A path filter cannot tell an
  # image-affecting flake.nix edit from an unrelated one; only the derivation can.
  # So we ask Nix what the image evaluates to (its drvPath — pure eval, NO build, NO
  # realisation) and compare against what was last successfully published.
  #
  # Mechanism: actions/cache keyed on sha256(drv_img).
  #   cache HIT  ⇒ this exact image was already published ⇒ changed=false ⇒ SKIP.
  #   cache MISS ⇒ new/changed content (or first-ever run) ⇒ changed=true  ⇒ BUILD+PUBLISH.
  # The key is SAVED (by the `record-baseline` job) only after the build+upload
  # succeeds, so a failed run never poisons the baseline into skipping the next
  # (needed) republish. First run, workflow_dispatch, and any non-main ref all
  # force changed=true.
  #
  # DEVIATION from build-devcontainer (which still builds+smoke-tests an unchanged
  # image and gates only the push): we gate the WHOLE build job. There are no
  # smoke/regression guards worth running on an unchanged image and the cold RPi
  # kernel is ~1h, so an unchanged image must skip the BUILD as well as the upload —
  # hence `changed` guards the build job's `if:`, not individual steps.
  #
  # Bias is conservative on FORWARD change: drvPath can flip without the output
  # bytes changing (a harmless re-publish), but it can never stay the same when the
  # output changes — so a genuine change is always republished.
  #
  # KNOWN LIMITATION — revert within the ~7-day cache window. installer-latest is a
  # single MUTABLE slot holding only the LAST-published image, while the gate marker
  # records every drvPath EVER published. Publish K1, then K2, then REVERT to K1
  # while K1's marker is still cached: the gate sees a HIT and SKIPS, so the release
  # keeps serving K2's image. So the "never under-publish" guarantee holds for
  # forward changes but NOT for a revert to a recently-published state. Recover
  # immediately with a manual `workflow_dispatch` (forces changed=true) — a mutable
  # rolling release cannot be made revert-safe by an ever-published cache alone, and
  # reverting the image within a week is rare enough that one click is the right
  # cost. (record-baseline's post-publish asset check, below, still guarantees we
  # never record a baseline for a publish that did not actually land.)
  gate:
    runs-on: ubuntu-24.04-arm # native aarch64 — eval is arch-agnostic; cheapest correct runner
    timeout-minutes: 15
    outputs:
      changed: ${{ steps.decide.outputs.changed }}
      cache_key: ${{ steps.key.outputs.cache_key }}
      # Always 'true' for THIS workflow's triggers (push-to-main + workflow_dispatch,
      # no PR), but kept as a faithful mirror of build-devcontainer's gate so the
      # build/record-baseline `if:` stay identical — and safe if a PR trigger is
      # ever added.
      is_publish: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Pure drvPath eval needs Nix + flakes but NO substituter/cachix. Reuse the
      # install-nix-action pin already in this file (NOT the ./.github/actions/
      # nix-setup composite, which pins a DIFFERENT install-nix SHA — keep this
      # workflow self-consistent).
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Flakes evaluate the git tree, not the working dir — stage everything BEFORE
      # `nix eval`, or the gate could hash a different tree than the build job builds.
      - name: Stage tree (git purity)
        run: git add -A

      - name: Evaluate both prebuilt drvPaths (pure eval, no build)
        id: key
        run: |
          set -euo pipefail
          DRV_IMG="$(nix eval --raw .#packages.aarch64-linux.nixpi-sd-image.drvPath)"
          DRV_ISO="$(nix eval --raw .#packages.aarch64-linux.nixvm-installer-iso.drvPath)"
          echo "drv nixpi-img: ${DRV_IMG}"
          echo "drv nixvm-iso: ${DRV_ISO}"
          # Fold BOTH artifacts' drvPaths into the gate key: a change to EITHER (the
          # nixpi image or the nixvm ISO) must retrigger the build+publish, so the key
          # must move when either drv moves. Order is fixed (img then iso) for a stable
          # hash. drvPath can flip without the output bytes changing (a harmless
          # re-publish) but can never stay put when an output changes — never under-publish.
          COMBINED="$(printf '%s\n%s\n' "${DRV_IMG}" "${DRV_ISO}" | sha256sum | cut -d' ' -f1)"
          # v4: RE-ADDED the nixvm-installer ISO drvPath to the combined key (v3 keyed
          # on the nixpi image ALONE after the ISO leg was dropped; v2 had combined
          # both). Bumping the version guarantees the first run under two-leg semantics
          # can't be skipped by a stale single-leg (v3) HIT. Bump again (v5, …) on any
          # future change to what is gated here.
          echo "cache_key=installers-drv-v4-${COMBINED}" >> "$GITHUB_OUTPUT"

      - name: Probe published baseline
        id: probe
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .gate-marker
          key: ${{ steps.key.outputs.cache_key }}
          lookup-only: true

      - name: Decide changed
        id: decide
        env:
          HIT: ${{ steps.probe.outputs.cache-hit }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ "${FORCE}" = "true" ] || [ "${HIT}" != "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::nixpi image or nixvm ISO CHANGED (or forced/first-run) — will build+publish both."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::nixpi image + nixvm ISO drvPaths unchanged — SKIPPING build+publish (no-op re-upload avoided)."
          fi

  # BUILD: delegated to the reusable build-installers-impl.yml so the build job is
  # gated by ONE `if:`. This is WHY the two-leg matrix lives in the called workflow:
  # a matrix job skipped by a job-level `if:` renders its name UNEXPANDED, so gating
  # HERE (one `if:` on `installers`) keeps a skip as a single clean `installers` job,
  # while a run expands both cells — `installers / build (nixpi-sd-img)` and
  # `installers / build (nixvm-live-iso)`. `contents: write` (the installer-latest
  # Release upload) is granted here and caps the called workflow's token; the
  # eval-only `gate` and cache-only `record-baseline` jobs never receive it.
  installers:
    needs: [gate]
    permissions:
      contents: write
    # Skip BOTH the ~1h build and the non-idempotent multi-GB upload when the image
    # is unchanged. is_publish is always true for this workflow's triggers; the
    # load-bearing guard is changed (see the gate comment).
    if: needs.gate.outputs.is_publish == 'true' && needs.gate.outputs.changed == 'true'
    uses: ./.github/workflows/build-installers-impl.yml
    secrets: inherit

  # RECORD-BASELINE: save the gate marker ONLY after a fully successful publish, so
  # the next run's gate probe can SKIP an unchanged image. `needs: [installers]`
  # waits for the reusable build workflow to succeed, so a failed build → this job
  # skips → the baseline is never poisoned into skipping a still-needed republish.
  record-baseline:
    needs: [gate, installers]
    if: needs.gate.outputs.is_publish == 'true' && needs.gate.outputs.changed == 'true'
    runs-on: ubuntu-24.04-arm
    # Read-only: this job reads the release to verify assets, then writes only a
    # Cachix-side cache marker (no GitHub state).
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      # HARD POST-PUBLISH GUARD (the mirror of build-devcontainer's "verify :latest
      # is pullable" step). softprops exiting 0 does NOT prove the asset landed — a
      # partial/empty upload would otherwise let us record a baseline and thereby
      # SUPPRESS the next, still-needed republish. Confirm a real .img* is actually
      # attached to installer-latest before trusting the publish enough to bake its
      # drvPath into the gate baseline.
      - name: Verify installer-latest actually has BOTH prebuilt artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          names="$(gh release view installer-latest -R "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
          echo "installer-latest assets:"; printf '%s\n' "$names" | sed 's/^/  /'
          # BOTH must be present before we trust the publish enough to bake its drvPath
          # into the gate baseline — a partial upload (only one artifact landed) would
          # otherwise record a baseline and SUPPRESS the next, still-needed republish of
          # the missing one.
          printf '%s\n' "$names" | grep -Eq '\.img' \
            || { echo "::error::no .img asset on installer-latest — refusing to record the gate baseline"; exit 1; }
          printf '%s\n' "$names" | grep -Eq '\.iso' \
            || { echo "::error::no .iso asset on installer-latest — refusing to record the gate baseline"; exit 1; }
          echo "✓ nixpi image + nixvm ISO both present on installer-latest"

      - name: Create gate marker
        run: echo "${{ needs.gate.outputs.cache_key }} @ ${{ github.sha }}" > .gate-marker

      - name: Record published baseline (gate cache)
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .gate-marker
          key: ${{ needs.gate.outputs.cache_key }}
