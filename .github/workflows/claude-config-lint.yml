# claude-config-lint — validate the repo's .claude/ configuration
#
# Runs @carlrannaberg/cclint over the Claude Code project config so malformed
# agent/command frontmatter, bad CLAUDE.md structure, or invalid config land as
# a red check instead of silently degrading the assistant experience.
#
# Scope note: cclint has four sub-linters (agents, commands, context, settings).
# We run agents + commands + context with --fail-on error. We deliberately do
# NOT run the `settings` sub-linter: cclint's bundled schema (0.2.x) only knows
# the { "type": "command" } hook shape and rejects { "type": "prompt" } hooks,
# which are a current, supported Claude Code feature that .claude/settings.json
# uses (PreToolUse/SubagentStop validators). Running `settings` would fail the
# gate on a linter false positive. Editor-side validation of settings.json is
# instead provided by its "$schema" key (json.schemastore.org). Revisit and add
# `cclint settings` here once upstream recognizes prompt hooks.
#
# Triggers: every PR, every push to main, and on demand.

name: claude-config-lint

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: claude-config-lint-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: only needs to read the checked-out tree.
permissions:
  contents: read

jobs:
  cclint:
    name: Lint .claude config
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      # cclint pinned to an exact published version for reproducible runs.
      - name: Lint agents, commands, and CLAUDE.md context
        run: |
          npx --yes @carlrannaberg/cclint@0.2.10 agents   --fail-on error
          npx --yes @carlrannaberg/cclint@0.2.10 commands --fail-on error
          npx --yes @carlrannaberg/cclint@0.2.10 context  --fail-on error
